# vim:set ft=tmux:

# Shared block renderer for the squared/rounded/slanted window variants.
# Expects @themux_window_*_border to be set by the variant file.
set -gF window-status-activity-style "bg=#{@thm_lavender},fg=#{@thm_crust}"
set -gF window-status-bell-style "bg=#{@thm_yellow},fg=#{@thm_crust}"
set -gF window-status-separator \
  "#[fg=#{E:@themux_window_divider_color},bg=#{@_tmx_status_bg}]#{E:@themux_window_divider}"

source -F "#{d:current_file}/window_flags.conf"
source -F "#{d:current_file}/window_text.conf"

# DO NOT USE -o IN YOUR OWN CONFIGURATION
set -ogqF @themux_window_current_left_border "#{@themux_window_left_border}"
set -ogqF @themux_window_current_middle_separator "#{@themux_window_middle_separator}"
set -ogqF @themux_window_current_right_border "#{@themux_window_right_border}"

# @themux_window_fill: "icon" colours only the number block and leaves the name
# as accent text on the surface; "all" paints the whole badge one colour. The
# name's background (@_tmx_w(c)t_bg) is also the right-cap colour, so it must be
# the surface where a name shows and the number colour where it does not (never
# mode, or a manual-hidden window) — decided per window in manual mode, hence
# the escaped "##{?##{E:@_tmx_w_text},...}".
%if "#{!=:#{@themux_window_fill},icon}"
  set -gF @_tmx_wt_fg "#{@thm_crust}"
  set -gF @_tmx_cwt_fg "#{@thm_crust}"
  set -gF @_tmx_wt_bg "#{@themux_window_number_color}"
  set -gF @_tmx_cwt_bg "#{@themux_window_current_number_color}"
%else
  set -gF @_tmx_wt_fg "#{@themux_window_number_color}"
  set -gF @_tmx_cwt_fg "#{@themux_window_current_number_color}"
  %if "#{==:#{@themux_window_text_mode},never}"
    set -gF @_tmx_wt_bg "#{@themux_window_number_color}"
    set -gF @_tmx_cwt_bg "#{@themux_window_current_number_color}"
  %elif "#{==:#{@themux_window_text_mode},manual}"
    set -gF @_tmx_wt_bg \
      "##{?##{E:@_tmx_w_text},#{E:@themux_window_text_color},#{E:@themux_window_number_color}}"
    set -gF @_tmx_cwt_bg \
      "##{?##{E:@_tmx_cw_text},#{E:@themux_window_current_text_color},#{E:@themux_window_current_number_color}}"
  %else
    set -gF @_tmx_wt_bg "#{@themux_window_text_color}"
    set -gF @_tmx_cwt_bg "#{@themux_window_current_text_color}"
  %endif
%endif

# The styles and name container are referenced at draw time (so @_tmx_w(c)t_bg
# resolves per window), so they stay set — escaped "##{E:...}" survives the
# format's own -F. The internal reset clears them on the next reload.
set -gF @_tmx_w_number_style "#[fg=#{@thm_crust},bg=#{@themux_window_number_color}]"
set -gF @_tmx_cw_number_style "#[fg=#{@thm_crust},bg=#{@themux_window_current_number_color}]"
set -gF @_tmx_w_text_style "#[fg=#{E:@_tmx_wt_fg},bg=##{E:@_tmx_wt_bg}]"
set -gF @_tmx_cw_text_style "#[fg=#{E:@_tmx_cwt_fg},bg=##{E:@_tmx_cwt_bg}]"
set -gF @_tmx_w_namepart \
  "#{E:@themux_window_middle_separator}##{E:@_tmx_w_text_style}##{E:@_tmx_w_text}"
set -gF @_tmx_cw_namepart \
  "#{E:@themux_window_current_middle_separator}##{E:@_tmx_cw_text_style}##{E:@_tmx_cw_text}"

%if "#{==:#{@themux_window_number_position},left}"
  set -gF window-status-format \
    "#{E:@_tmx_w_number_style}#{E:@themux_window_left_border}#{@themux_window_number}"
  set -agF window-status-format "##{?##{E:@_tmx_w_text},##{E:@_tmx_w_namepart}, }"
  set -agF window-status-format "#{@_tmx_w_flags}##{E:@themux_window_right_border}"
%elif "#{!=:#{@_tmx_w_text},}"
  set -gF window-status-format \
    "##{E:@_tmx_w_text_style}#{E:@themux_window_left_border}##{E:@_tmx_w_text_style}##{E:@_tmx_w_text}#{@_tmx_w_flags}"
  set -agF window-status-format "#{E:@themux_window_middle_separator}"
  set -agF window-status-format \
    "#{E:@_tmx_w_number_style} #{@themux_window_number}##{E:@themux_window_right_border}"
%else
  set -gF window-status-format \
    "#{E:@_tmx_w_number_style}#{E:@themux_window_left_border}#{@themux_window_number}#{@_tmx_w_flags}##{E:@themux_window_right_border}"
%endif

%if "#{==:#{@themux_window_number_position},left}"
  set -gF window-status-current-format \
    "#{E:@_tmx_cw_number_style}#{E:@themux_window_current_left_border}#{@themux_window_current_number}"
  set -agF window-status-current-format "##{?##{E:@_tmx_cw_text},##{E:@_tmx_cw_namepart}, }"
  set -agF window-status-current-format "#{@_tmx_w_flags}##{E:@themux_window_current_right_border}"
%elif "#{!=:#{@_tmx_cw_text},}"
  set -gF window-status-current-format \
    "##{E:@_tmx_cw_text_style}#{E:@themux_window_current_left_border}##{E:@_tmx_cw_text_style}##{E:@_tmx_cw_text}#{@_tmx_w_flags}"
  set -agF window-status-current-format "#{E:@themux_window_current_middle_separator}"
  set -agF window-status-current-format \
    "#{E:@_tmx_cw_number_style} #{@themux_window_current_number}##{E:@themux_window_current_right_border}"
%else
  set -gF window-status-current-format \
    "#{E:@_tmx_cw_number_style}#{E:@themux_window_current_left_border}#{@themux_window_current_number}#{@_tmx_w_flags}##{E:@themux_window_current_right_border}"
%endif

set -ug @_tmx_w_flags
