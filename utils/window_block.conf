# vim:set ft=tmux:
#
# Shared setup for the window status (any non-unstyled shape): the list-level
# styles and the inter-window separator, then assemble the formats in
# utils/window_render.sh, which resolves the per-side component styles (number
# and name) and draws the shape's caps. Mirrors utils/panes_block.conf.
set -gF window-status-activity-style "bg=#{@thm_lavender},fg=#{@thm_crust}"
set -gF window-status-bell-style "bg=#{@thm_yellow},fg=#{@thm_crust}"
set -gF window-status-separator \
  "#[fg=#{E:@themux_window_divider_color},bg=#{@_tmx_status_bg}]#{E:@themux_window_divider}"

# The component styles carry all colour, so the list base styles stay neutral.
set -g window-status-style "default"
set -g window-status-current-style "default"
set -g window-status-last-style "default"

source -F "#{d:current_file}/window_flags.conf"
source -F "#{d:current_file}/window_text.conf"

run "#{d:current_file}/window_render.sh"
