# vim:set ft=tmux:
#
# Shared setup for the optional pane status label, used by the squared/rounded/
# slanted pane variants (mirrors utils/window_block.conf). The variant sets the
# cap glyphs @themux_pane_left_border / @themux_pane_right_border, then sources
# this file; utils/pane_render.sh assembles the label so the active pane reads
# like the active window.
set -wgF pane-active-border-style "#{E:@themux_pane_active_border_style}"
set -wgF pane-border-style "#{E:@themux_pane_border_style}"

%if "#{!=:#{@themux_pane_status},off}"
  # Turn the border label on (top/bottom) — enabling the status is
  # self-sufficient; no separate pane-border-status needed.
  set -gF pane-border-status "#{@themux_pane_status}"

  # Assemble pane-border-format in shell: plain #{...} draw-time refs (no ##
  # doubling), the structure mirrored from the window badge.
  run "#{d:current_file}/pane_render.sh"
%endif
