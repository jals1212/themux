# vim:set ft=tmux:
#
# Shared renderer for the optional pane status label, used by the squared/
# rounded/slanted pane variants (mirrors utils/window_block.conf). The caller
# sets the cap glyphs @themux_pane_left_border / @themux_pane_right_border, then
# sources this file; the middle separator defaults to a solid block.
set -ogq @themux_pane_middle_separator "█"

set -wgF pane-active-border-style "#{E:@themux_pane_active_border_style}"
set -wgF pane-border-style "#{E:@themux_pane_border_style}"

%if "#{!=:#{@themux_pane_status},off}"
  # Turn the border label on (top/bottom) — enabling the status is
  # self-sufficient; no separate pane-border-status needed.
  set -gF pane-border-status "#{@themux_pane_status}"

  # "internal" variables are kept as @_tmx_p_.*
  # and then unset at the end.
  set -gq @_tmx_p_left "" # the content on the left, usually a separator
  set -gq @_tmx_p_middle ""
  set -gq @_tmx_p_right ""
  set -gq @_tmx_p_number ""
  set -gq @_tmx_p_text ""

  # Only the active pane takes the accent color; inactive panes dim to
  # overlay_0. The "##{?pane_active,...}" is escaped on purpose: pane-border-
  # format is set with -F (one expansion), so a bare "#{?pane_active}" would be
  # resolved then — with no current pane, baking every pane to the same color.
  # The extra "#" lets it survive to draw time, where it is evaluated per pane.
  %if "#{==:#{@themux_panes_fill},none}"
    set -g @_tmx_p_left \
      "#[fg=#{@thm_surface_0},bg=default]#{@themux_pane_left_border}"
    set -g @_tmx_p_middle \
      "#[fg=#{@thm_fg},bg=#{@thm_surface_0}]#{@themux_pane_middle_separator}"
    set -g @_tmx_p_right \
      "#[fg=#{@thm_surface_0},bg=default]#{@themux_pane_right_border}"

    set -g @_tmx_p_number \
      "#[fg=#{@thm_fg},bg=#{@thm_surface_0}]##{pane_index}"
    set -g @_tmx_p_text \
      "#[fg=#{@thm_fg},bg=#{@thm_surface_0}]#{E:@themux_pane_default_text}"

  %elif "#{==:#{@themux_panes_fill},all}"

    set -g @_tmx_p_left \
      "#[fg=##{?pane_active,#{E:@themux_pane_color},#{E:@thm_overlay_0}},bg=default]#{@themux_pane_left_border}"
    set -g @_tmx_p_middle \
      "#[fg=##{?pane_active,#{E:@themux_pane_color},#{E:@thm_overlay_0}},bg=#{E:@themux_pane_background_color}]#{@themux_pane_middle_separator}"
    set -g @_tmx_p_right \
      "#[fg=##{?pane_active,#{E:@themux_pane_color},#{E:@thm_overlay_0}},bg=default]#{@themux_pane_right_border}"

    set -g @_tmx_p_number \
      "#[fg=#{E:@themux_pane_background_color},bg=##{?pane_active,#{E:@themux_pane_color},#{E:@thm_overlay_0}}]##{pane_index}"
    set -g @_tmx_p_text \
      "#[fg=#{E:@themux_pane_background_color},bg=##{?pane_active,#{E:@themux_pane_color},#{E:@thm_overlay_0}}]#{E:@themux_pane_default_text}"

  %elif "#{==:#{@themux_panes_fill},icon}"

    %if "#{==:#{@themux_pane_number_position},left}"
      set -g @_tmx_p_left \
        "#[fg=##{?pane_active,#{E:@themux_pane_color},#{E:@thm_overlay_0}},bg=default]#{@themux_pane_left_border}"
      set -g @_tmx_p_right \
        "#[fg=#{E:@themux_pane_background_color},bg=default]#{@themux_pane_right_border}"
    %else
      set -g @_tmx_p_left \
        "#[fg=#{E:@themux_pane_background_color},bg=default]#{@themux_pane_left_border}"
      set -g @_tmx_p_right \
        "#[fg=##{?pane_active,#{E:@themux_pane_color},#{E:@thm_overlay_0}},bg=default]#{@themux_pane_right_border}"
    %endif

    set -g @_tmx_p_middle \
      "#[fg=##{?pane_active,#{E:@themux_pane_color},#{E:@thm_overlay_0}},bg=#{E:@themux_pane_background_color}]#{@themux_pane_middle_separator}"

    set -g @_tmx_p_number \
      "#[fg=#{E:@themux_pane_background_color},bg=##{?pane_active,#{E:@themux_pane_color},#{E:@thm_overlay_0}}]##{pane_index}"
    set -g @_tmx_p_text \
      "#[fg=##{?pane_active,#{E:@themux_pane_color},#{E:@thm_overlay_0}},bg=#{E:@themux_pane_background_color}]#{E:@themux_pane_default_text}"

  %endif

  %if "#{==:#{@themux_pane_number_position},left}"
    set -wgF pane-border-format \
      "#{E:@_tmx_p_left}#{E:@_tmx_p_number}#{E:@_tmx_p_middle} #{E:@_tmx_p_text}#{E:@_tmx_p_right}"
  %else
    set -wgF pane-border-format \
      "#{E:@_tmx_p_left}#{E:@_tmx_p_text} #{E:@_tmx_p_middle}#{E:@_tmx_p_number}#{E:@_tmx_p_right}"
  %endif

  set -ug @_tmx_p_left
  set -ug @_tmx_p_middle
  set -ug @_tmx_p_right
  set -ug @_tmx_p_number
  set -ug @_tmx_p_text
%endif
