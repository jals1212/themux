# vim:set ft=tmux:
#
# Shared renderer for the tmux-cpu metric modules (cpu, ram). The caller sets
# MODULE_NAME and @themux_<name>_icon, then sources this file; adding a metric
# module (e.g. gpu) is just those two lines plus this source.
#
# The metric's accent IS tmux-cpu's live level colour #{<name>_bg_color}, so it
# escalates green -> yellow -> red as the value climbs. The default variants place
# that live colour like any module: the icon is `solid` (a coloured block — green
# at rest, reddening as it heats) and the text is `subtle` (grey block, the digits
# take the live colour). Restyle with @themux_<name>_{leading,text}_variant (naked =
# bare text, soft = mute), or pin a fixed icon accent with @themux_<name>_color. A
# variant *switch* on alert cannot work for a metric (its segment is composed inline
# for tmux-cpu, so a draw-time #{?} is baked away) — the escalation rides in the
# colour, not a variant change.
#
# Level colours are baked to hex (-F, re-baked each load so a theme switch tracks)
# because tmux does NOT re-expand a #(...) result — tmux-cpu echoes these verbatim.
set -gqF "@${MODULE_NAME}_low_bg_color" "#{E:@thm_green}"     # base: all good
set -gqF "@${MODULE_NAME}_medium_bg_color" "#{E:@thm_yellow}"
set -gqF "@${MODULE_NAME}_high_bg_color" "#{E:@thm_red}"

set -ogq "@themux_${MODULE_NAME}_expand" "yes" # tmux-cpu literals need inline compose
set -ogq "@themux_${MODULE_NAME}_plugin" "tmux-cpu/cpu.tmux" # source of do_interpolation

# Live level colour feeds both slots: solid icon -> coloured block, subtle text ->
# coloured digits on grey. Both escalate green -> red.
set -ogq "@themux_${MODULE_NAME}_color" "#{l:#{${MODULE_NAME}_bg_color}}"
set -ogq "@themux_${MODULE_NAME}_text_variant" "subtle"
set -ogq "@themux_${MODULE_NAME}_text" "#{l:#{${MODULE_NAME}_percentage}}"

source -F "#{d:current_file}/module_block.conf"
