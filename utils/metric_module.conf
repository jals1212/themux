# vim:set ft=tmux:
#
# Shared renderer for the tmux-cpu threshold modules (cpu, ram). The caller
# sets MODULE_NAME and @themux_<name>_icon, then sources this file; adding a
# new metric module (e.g. gpu) is just those two lines plus this source.
#
# In a block style the whole pill follows tmux-cpu's threshold colour (icon,
# text and caps), so an alert reads as a single red block; a naked text has no
# block, so the threshold colour drives the (single-colour) text instead.
set -ogq "@${MODULE_NAME}_low_fg_color" "#{E:@thm_crust}"
set -ogq "@${MODULE_NAME}_medium_fg_color" "#{E:@thm_crust}"
set -ogq "@${MODULE_NAME}_high_fg_color" "#{E:@thm_crust}"

set -ogq "@${MODULE_NAME}_low_bg_color" "#{E:@thm_yellow}"
set -ogq "@${MODULE_NAME}_medium_bg_color" "#{E:@thm_yellow}"
set -ogq "@${MODULE_NAME}_high_bg_color" "#{E:@thm_red}"

# The accent follows the live threshold colour: it drives a naked text directly,
# and is the cap colour for an outlined (rounded/slanted) naked pill.
set -ogq "@themux_${MODULE_NAME}_color" "#{l:#{${MODULE_NAME}_bg_color}}"
set -ogq "@themux_${MODULE_NAME}_expand" "yes" # tmux-cpu literal needs inline compose

# Block text -> override the whole pill with the threshold colours. naked text ->
# leave the blocks unset so status_module resolves transparent, accent text.
%if "#{!=:#{@themux_module_text},naked}"
  set -ogq "@themux_${MODULE_NAME}_icon_fg" "#{l:#{${MODULE_NAME}_fg_color}}"
  set -ogq "@themux_${MODULE_NAME}_icon_bg" "#{l:#{${MODULE_NAME}_bg_color}}"
  set -ogq "@themux_${MODULE_NAME}_text_fg" "#{l:#{${MODULE_NAME}_fg_color}}"
  set -ogq "@themux_${MODULE_NAME}_text_bg" "#{l:#{${MODULE_NAME}_bg_color}}"
%endif
set -ogq "@themux_${MODULE_NAME}_text" " #{l:#{${MODULE_NAME}_percentage}}"

source -F "#{d:current_file}/status_module.conf"
