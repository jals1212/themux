# vim:set ft=tmux:
#
# Shared renderer for the tmux-cpu threshold modules (cpu, ram). The caller sets
# MODULE_NAME and @themux_<name>_icon, then sources this file; adding a new metric
# module (e.g. gpu) is just those two lines plus this source.
#
# Three levels: calm (low) -> yellow (medium) -> red (high). tmux-cpu picks the
# live colour PAIR #{<name>_bg_color}/#{<name>_fg_color} from the level config
# below, and the module carries BOTH live through per-channel overrides — so the
# block escalates its colour at DRAW time, which a variant cannot do (the segment
# is baked once at layout time, so a draw-time condition would be baked away). The
# shipped look: a calm grey block with green digits at low, escalating to a solid
# yellow/red pill when hot. The two channels take DIFFERENT live refs (fg_color vs
# bg_color), so the pill always contrasts and can never go blank. Tune where it
# escalates with tmux-cpu's @<name>_medium_thresh / @<name>_high_thresh.
# Baked to concrete hex with -F (re-baked each load so a theme switch tracks):
# tmux-cpu echoes these verbatim into `bg=`/`fg=`, and tmux does NOT re-expand a
# #(...) result, so a #{@thm_*} ref must already be resolved here.
set -gqF "@${MODULE_NAME}_low_bg_color" "#{E:@thm_surface_0}"   # calm: grey block
set -gqF "@${MODULE_NAME}_medium_bg_color" "#{E:@thm_yellow}"
set -gqF "@${MODULE_NAME}_high_bg_color" "#{E:@thm_red}"
set -gqF "@${MODULE_NAME}_low_fg_color" "#{E:@thm_green}"       # calm: green digits
set -gqF "@${MODULE_NAME}_medium_fg_color" "#{E:@thm_crust}"
set -gqF "@${MODULE_NAME}_high_fg_color" "#{E:@thm_crust}"

set -ogq "@themux_${MODULE_NAME}_expand" "yes" # tmux-cpu literals need inline compose

# The live level colours ride in as per-channel overrides (icon + text, fg + bg),
# so both channels follow the threshold at draw time. The variant is just the
# block frame; restyle the levels through the @<name>_*_color options above.
set -ogq "@themux_${MODULE_NAME}_color" "#{l:#{${MODULE_NAME}_bg_color}}"
set -ogq "@themux_${MODULE_NAME}_icon_bg" "#{l:#{${MODULE_NAME}_bg_color}}"
set -ogq "@themux_${MODULE_NAME}_icon_fg" "#{l:#{${MODULE_NAME}_fg_color}}"
set -ogq "@themux_${MODULE_NAME}_text_bg" "#{l:#{${MODULE_NAME}_bg_color}}"
set -ogq "@themux_${MODULE_NAME}_text_fg" "#{l:#{${MODULE_NAME}_fg_color}}"
set -ogq "@themux_${MODULE_NAME}_leading_variant" "solid"
set -ogq "@themux_${MODULE_NAME}_text_variant" "solid"
set -ogq "@themux_${MODULE_NAME}_text" " #{l:#{${MODULE_NAME}_percentage}}"

source -F "#{d:current_file}/module_block.conf"
