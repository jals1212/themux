# vim:set ft=tmux:
#
# Shared renderer for the tmux-cpu threshold modules (cpu, ram). The caller sets
# MODULE_NAME and @themux_<name>_icon, then sources this file; adding a new metric
# module (e.g. gpu) is just those two lines plus this source.
#
# Three levels: calm (low) -> yellow (medium) -> red (high). tmux-cpu picks the
# live colour #{<name>_bg_color} from the level thresholds below; that live ref IS
# the module accent, so the colour escalates by itself and the variant decides how
# it shows: solid = a live-coloured pill with crust text, subtle = the digits in
# the live colour over a neutral block, naked = live text on the bar. The variant
# owns both channels, so the alert can never collapse to bg == fg (go blank).
set -ogq "@${MODULE_NAME}_low_bg_color" "#{E:@thm_green}"
set -ogq "@${MODULE_NAME}_medium_bg_color" "#{E:@thm_yellow}"
set -ogq "@${MODULE_NAME}_high_bg_color" "#{E:@thm_red}"

set -ogq "@themux_${MODULE_NAME}_expand" "yes" # tmux-cpu literal needs inline compose

# The live threshold colour is the accent; ship a solid live pill by default.
# Override @themux_<name>_{leading,text}_variant for a calmer look (subtle/naked).
set -ogq "@themux_${MODULE_NAME}_color" "#{l:#{${MODULE_NAME}_bg_color}}"
set -ogq "@themux_${MODULE_NAME}_leading_variant" "solid"
set -ogq "@themux_${MODULE_NAME}_text_variant" "solid"
set -ogq "@themux_${MODULE_NAME}_text" " #{l:#{${MODULE_NAME}_percentage}}"

source -F "#{d:current_file}/module_block.conf"
