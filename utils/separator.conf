# vim:set ft=tmux:

# Builds the @themux_status_<SEPARATOR_NAME> divider segment.
# Character, color and padding are per separator instance:
#
# - @themux_<name>_char      [default = " │ "]
# - @themux_<name>_color     [default = overlay_0]
set -ogq "@themux_${SEPARATOR_NAME}_char" " │ "
set -ogq "@themux_${SEPARATOR_NAME}_color" "#{E:@thm_overlay_0}"

# Built without -F: everything resolves at display time, so the template can
# be sourced from a user config before the plugin's deferred `run` executes.
set -g "@themux_status_${SEPARATOR_NAME}" \
  "#[fg=#{E:@themux_${SEPARATOR_NAME}_color},bg=default]#{E:@themux_${SEPARATOR_NAME}_char}"
