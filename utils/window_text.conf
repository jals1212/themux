# vim:set ft=tmux:
#
# Computes @_tmx_w_text / @_tmx_cw_text — the effective window name per
# @themux_window_name_mode, resolved per window at draw time. Sourced by the
# block and naked window variants.
#   always -> @themux_window_(current_)name
#   never  -> "" (name hidden, number only)
#   manual -> shown only on windows renamed by hand (automatic-rename is "0";
#             "1" while tmux auto-names the window)
%if "#{==:#{@themux_window_name_mode},never}"
  set -g @_tmx_w_text ""
  set -g @_tmx_cw_text ""
%elif "#{==:#{@themux_window_name_mode},manual}"
  set -gF @_tmx_w_text "##{?##{E:automatic-rename},,#{@themux_window_name}}"
  set -gF @_tmx_cw_text "##{?##{E:automatic-rename},,#{@themux_window_current_name}}"
%else
  set -gF @_tmx_w_text "#{@themux_window_name}"
  set -gF @_tmx_cw_text "#{@themux_window_current_name}"
%endif
