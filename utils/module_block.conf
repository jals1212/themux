# vim:set ft=tmux:
#
# Module tail: every modules/*.conf sources this after setting MODULE_NAME and
# its icon/colour/text props. The render lives in utils/module_render.sh; this
# shim dispatches it, but ONLY for modules actually referenced in a status line.
# Rendering all ~17 modules on source was the bulk of load time, so unused ones
# skip the (forking) render — the parse-time %if below costs nothing.
#
# Membership is a substring match against the five lines (joined by spaces so a
# token cannot straddle a line boundary). This is safe only while no module name
# is a substring of another module name or of "windows"; keep names distinct.
%if "#{!=:#{@themux_module_shape},unstyled}"
  %if "#{m:*${MODULE_NAME}*,#{@themux_status_line_1} #{@themux_status_line_2} #{@themux_status_line_3} #{@themux_status_line_4} #{@themux_status_line_5}}"
    run "#{d:current_file}/module_render.sh ${MODULE_NAME}"
  %endif
%endif
