# vim:set ft=tmux:

# Builds the @themux_status_<DIVIDER_NAME> divider segment — a component you
# compose between modules, with the same prop shape as a module (text + color).
#
# - @themux_<name>_text   [default = " │ ", includes its own padding]
# - @themux_<name>_color  [default = overlay_0, matching the active pane border]
set -ogq "@themux_${DIVIDER_NAME}_text" " │ "
set -ogq "@themux_${DIVIDER_NAME}_color" "#{E:@thm_overlay_0}"

# Built without -F: everything resolves at display time, so the template can
# be sourced from a user config before the plugin's deferred `run` executes.
set -g "@themux_status_${DIVIDER_NAME}" \
  "#[fg=#{E:@themux_${DIVIDER_NAME}_color},bg=default]#{E:@themux_${DIVIDER_NAME}_text}"
