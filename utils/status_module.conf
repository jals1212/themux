# vim:set ft=tmux:

# Renders @themux_status_<MODULE_NAME> with the selected status variant;
# "unstyled" leaves the segment undefined so users can build their own.
# @themux_module_fill ("all" | "icon") picks whether the whole segment takes
# the module color or only the icon does.
#
# NOTE: status variants are inline branches (not files like the windows and
# panes variants) on purpose: every module loads this file, and tmux caps a
# source chain at 50 files — one extra hop per module would blow the budget.
%if "#{==:#{@_tmx_module_fill},naked}"

  # Naked modules: icon + text in the module color on the transparent
  # background — one color, no block. (Color blocks are reserved for marking
  # the active window/pane.)
  set -gF "@themux_module_${MODULE_NAME}" \
    "#[fg=#{@themux_${MODULE_NAME}_color},bg=default]#{@themux_${MODULE_NAME}_icon}"
  set -ag "@themux_module_${MODULE_NAME}" "#{E:@themux_${MODULE_NAME}_text}"

%elif "#{!=:#{@_tmx_module_shape},unstyled}"

  # Block modules (squared/rounded/slanted): a solid module-colored block.
  # "all" fills the whole pill (icon + text) with the module color; "icon"
  # colors only the icon and leaves the text on the neutral surface color;
  # "none" keeps the whole pill neutral (surface), no accent at all.
  # Alert modules (ram/cpu) override fg/bg with their threshold colors — the
  # exception to the fill rule.
  #
  # Borders come from the variant, drawn in the module color on the bar:
  # squared a full block, rounded/slanted their cap glyphs. The right border
  # follows @_tmx_module_text_bg so it matches the text block.
  %if "#{==:#{@_tmx_module_shape},squared}"
    set -gq @themux_module_left_border "█"
    set -gq @themux_module_right_border "█"
  %elif "#{==:#{@_tmx_module_shape},slanted}"
    set -gq @themux_module_left_border ""
    set -gq @themux_module_right_border ""
  %else
    set -gq @themux_module_left_border ""
    set -gq @themux_module_right_border ""
  %endif

  set -gqF @_tmx_connect_style \
    "#{?#{==:#{@themux_module_connect_separator},yes},,#[bg=default]}"

  %if "#{==:#{@_tmx_module_fill},fill}"
    set -ogqF "@themux_${MODULE_NAME}_icon_fg" "#{E:@thm_crust}"
    set -ogqF "@themux_${MODULE_NAME}_text_fg" "#{E:@thm_crust}"
  %elif "#{==:#{@_tmx_module_fill},none}"
    set -ogqF "@themux_${MODULE_NAME}_icon_fg" "#{E:@thm_fg}"
    set -ogqF "@themux_${MODULE_NAME}_text_fg" "#{E:@thm_fg}"
  %else
    set -ogqF "@themux_${MODULE_NAME}_icon_fg" "#{E:@thm_crust}"
    set -ogqF "@themux_${MODULE_NAME}_text_fg" "#{E:@thm_fg}"
  %endif

  %if "#{==:#{@themux_${MODULE_NAME}_icon_bg},}"
    %if "#{==:#{@_tmx_module_fill},none}"
      set -gqF "@themux_${MODULE_NAME}_icon_bg" "#{E:@thm_surface_0}"
    %else
      set -gqF "@themux_${MODULE_NAME}_icon_bg" "#{@themux_${MODULE_NAME}_color}"
    %endif
  %endif

  %if "#{==:#{@themux_${MODULE_NAME}_text_bg},}"
    %if "#{==:#{@_tmx_module_fill},fill}"
      set -gqF @_tmx_module_text_bg "#{@themux_${MODULE_NAME}_color}"
    %else
      set -gqF @_tmx_module_text_bg "#{E:@thm_surface_0}"
    %endif
  %else
    set -gqF @_tmx_module_text_bg "#{@themux_${MODULE_NAME}_text_bg}"
  %endif

  set -gF "@themux_module_${MODULE_NAME}" \
    "#[fg=#{@themux_${MODULE_NAME}_icon_bg}]#{@_tmx_connect_style}#{@themux_module_left_border}"

  # Centre the icon in its block. Icons carry one trailing space; a leading and
  # a trailing space here make it one space on the left and two on the right,
  # which reads as centred with the nerd-font glyphs' left bias.
  set -agF "@themux_module_${MODULE_NAME}" \
    "#[fg=#{@themux_${MODULE_NAME}_icon_fg},bg=#{@themux_${MODULE_NAME}_icon_bg}] #{@themux_${MODULE_NAME}_icon} "

  # The icon<->text seam. With notch it inherits the shape's right cap (the icon
  # block's bg tapering into the text bg) in place of the plain separator;
  # without notch it is the user's middle separator (empty by default).
  %if "#{==:#{@_tmx_module_notch},yes}"
    set -agF "@themux_module_${MODULE_NAME}" \
      "#[fg=#{@themux_${MODULE_NAME}_icon_bg},bg=#{@_tmx_module_text_bg}]#{@themux_module_right_border}"
  %else
    set -agF "@themux_module_${MODULE_NAME}" \
      "#{@themux_module_middle_separator}"
  %endif

  set -agF "@themux_module_${MODULE_NAME}" \
    "#[fg=#{@themux_${MODULE_NAME}_text_fg},bg=#{@_tmx_module_text_bg}]"

  set -ag "@themux_module_${MODULE_NAME}" "#{E:@themux_${MODULE_NAME}_text}"

  set -agF "@themux_module_${MODULE_NAME}" \
    "#[fg=#{@_tmx_module_text_bg}]#{@_tmx_connect_style}#{@themux_module_right_border}"

  set -ug @_tmx_connect_style
  set -ug @_tmx_module_text_bg

%endif
