# vim:set ft=tmux:

# Renders @themux_status_<MODULE_NAME> with the selected status variant;
# "unstyled" leaves the segment undefined so users can build their own.
# @themux_status_fill ("all" | "icon") picks whether the whole segment takes
# the module color or only the icon does.
#
# NOTE: status variants are inline branches (not files like the windows and
# panes variants) on purpose: every module loads this file, and tmux caps a
# source chain at 50 files — one extra hop per module would blow the budget.
%if "#{==:#{@themux_status_variant},naked}"

  # Naked modules: colored text on the default (transparent) background.
  # "all" colors icon + text in the module color; "icon" gives the icon a
  # colored block and leaves the text plain.
  %if "#{==:#{@themux_status_fill},icon}"
    set -gF "@themux_status_${MODULE_NAME}" \
      "#[fg=#{@thm_crust},bg=#{@themux_${MODULE_NAME}_color}]#{@themux_${MODULE_NAME}_icon}#[fg=#{@thm_fg},bg=default]"
    set -ag "@themux_status_${MODULE_NAME}" "#{E:@themux_${MODULE_NAME}_text}"
  %else
    set -ogqF "@themux_${MODULE_NAME}_text_fg" "#{@themux_${MODULE_NAME}_color}"
    set -gF "@themux_status_${MODULE_NAME}" \
      "#[fg=#{@themux_${MODULE_NAME}_text_fg},bg=default]#{@themux_${MODULE_NAME}_icon}"
    set -ag "@themux_status_${MODULE_NAME}" "#{E:@themux_${MODULE_NAME}_text}"
  %endif

%elif "#{!=:#{@themux_status_variant},unstyled}"

  # Block modules (squared/rounded/slanted): a solid module-colored block.
  # "all" fills the whole pill (icon + text) with the module color; "icon"
  # colors only the icon and leaves the text on the neutral surface color.
  # Alert modules (ram/cpu) override fg/bg with their threshold colors — the
  # exception to the fill rule.
  #
  # Borders come from the variant, drawn in the module color on the bar:
  # squared a full block, rounded/slanted their cap glyphs. The right border
  # follows @_tmx_module_text_bg so it matches the text block.
  %if "#{==:#{@themux_status_variant},squared}"
    set -ogq @themux_status_left_border "█"
    set -ogq @themux_status_right_border "█"
  %elif "#{==:#{@themux_status_variant},slanted}"
    set -ogq @themux_status_left_border ""
    set -ogq @themux_status_right_border ""
  %else
    set -ogq @themux_status_left_border ""
    set -ogq @themux_status_right_border ""
  %endif

  set -gqF @_tmx_connect_style \
    "#{?#{==:#{@themux_status_connect_separator},yes},,#[bg=default]}"

  set -ogqF "@themux_${MODULE_NAME}_icon_fg" "#{E:@thm_crust}"
  %if "#{==:#{@themux_status_fill},icon}"
    set -ogqF "@themux_${MODULE_NAME}_text_fg" "#{E:@thm_fg}"
  %else
    set -ogqF "@themux_${MODULE_NAME}_text_fg" "#{E:@thm_crust}"
  %endif

  %if "#{==:#{@themux_${MODULE_NAME}_icon_bg},}"
    set -gqF "@themux_${MODULE_NAME}_icon_bg" "#{@themux_${MODULE_NAME}_color}"
  %endif

  %if "#{==:#{@themux_${MODULE_NAME}_text_bg},}"
    %if "#{==:#{@themux_status_fill},icon}"
      set -gqF @_tmx_module_text_bg "#{E:@thm_surface_0}"
    %else
      set -gqF @_tmx_module_text_bg "#{@themux_${MODULE_NAME}_color}"
    %endif
  %else
    set -gqF @_tmx_module_text_bg "#{@themux_${MODULE_NAME}_text_bg}"
  %endif

  set -gF "@themux_status_${MODULE_NAME}" \
    "#[fg=#{@themux_${MODULE_NAME}_icon_bg}]#{@_tmx_connect_style}#{@themux_status_left_border}"

  set -agF "@themux_status_${MODULE_NAME}" \
    "#[fg=#{@themux_${MODULE_NAME}_icon_fg},bg=#{@themux_${MODULE_NAME}_icon_bg}]#{@themux_${MODULE_NAME}_icon}"

  set -agF "@themux_status_${MODULE_NAME}" \
    "#{@themux_status_middle_separator}"

  set -agF "@themux_status_${MODULE_NAME}" \
    "#[fg=#{@themux_${MODULE_NAME}_text_fg},bg=#{@_tmx_module_text_bg}]"

  set -ag "@themux_status_${MODULE_NAME}" "#{E:@themux_${MODULE_NAME}_text}"

  set -agF "@themux_status_${MODULE_NAME}" \
    "#[fg=#{@_tmx_module_text_bg}]#{@_tmx_connect_style}#{@themux_status_right_border}"

  set -ug @_tmx_connect_style
  set -ug @_tmx_module_text_bg

%endif
