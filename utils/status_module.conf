# vim:set ft=tmux:
#
# Each status module sources this after setting MODULE_NAME and its icon/colour/
# text. The render itself lives in utils/module_render.sh (shared with the
# window/pane resolver); this shim only dispatches it, skipping "unstyled" where
# themux leaves the segment alone so users can build their own.
#
# Deferred via `run` so the script reads the fully-set options. The shape check
# is a parse-time %if, which is fine: @themux_module_shape comes from a prior
# source (the options file), not from this file.
%if "#{!=:#{@themux_module_shape},unstyled}"
  run "#{d:current_file}/module_render.sh ${MODULE_NAME}"
%endif
