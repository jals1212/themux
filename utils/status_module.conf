# vim:set ft=tmux:

# Renders @themux_status_<MODULE_NAME> with the selected status variant;
# "unstyled" leaves the segment undefined so users can build their own.
#
# NOTE: status variants are inline branches (not files like the windows and
# panes variants) on purpose: every module loads this file, and tmux caps a
# source chain at 50 files — one extra hop per module would blow the budget.
%if "#{==:#{@themux_status_variant},flat}"

  # Flat modules: icon and text share the module color on the default
  # (transparent) background. Modules draw no dividers themselves — compose
  # them explicitly with the @themux_status_divider segment.
  set -ogqF "@themux_status_${MODULE_NAME}_text_fg" "#{@themux_${MODULE_NAME}_color}"

  set -gF "@themux_status_${MODULE_NAME}" \
    "#[fg=#{@themux_status_${MODULE_NAME}_text_fg},bg=default]#{@themux_${MODULE_NAME}_icon}"

  set -ag "@themux_status_${MODULE_NAME}" "#{E:@themux_${MODULE_NAME}_text}"

%elif "#{!=:#{@themux_status_variant},unstyled}"

  # Block modules (squared/rounded/slanted): one solid module-colored block.
  # Icon and text share the module color as background with crust foreground.
  # Alert modules (ram/cpu) override text fg/bg with their threshold colors —
  # alerts are the exception to the single-color rule.
  #
  # Borders come from the variant and are drawn in the module color on the
  # transparent bar: squared uses a full block (a solid colored cell, the
  # same one-cell padding as a cap), rounded/slanted use their cap glyphs.
  # @themux_status_{left,right}_border are set -ogq so a user value wins.
  %if "#{==:#{@themux_status_variant},squared}"
    set -ogq @themux_status_left_border "█"
    set -ogq @themux_status_right_border "█"
  %elif "#{==:#{@themux_status_variant},slanted}"
    set -ogq @themux_status_left_border ""
    set -ogq @themux_status_right_border ""
  %else
    set -ogq @themux_status_left_border ""
    set -ogq @themux_status_right_border ""
  %endif

  # Embedded style that keeps modules "connected" when requested; otherwise
  # the borders sit on the default (transparent) background.
  set -gqF @_tmx_connect_style \
    "#{?#{==:#{@themux_status_connect_separator},yes},,#[bg=default]}"

  #
  # - Icon
  #   - fg: @themux_status_[module]_icon_fg [default = crust]
  #   - bg: @themux_status_[module]_icon_bg [default = module color]
  # - Text
  #   - fg: @themux_status_[module]_text_fg [default = crust]
  #   - bg: @themux_status_[module]_text_bg [default = module color]

  set -ogqF "@themux_status_${MODULE_NAME}_icon_fg" "#{E:@thm_crust}"
  set -ogqF "@themux_status_${MODULE_NAME}_text_fg" "#{E:@thm_crust}"

  %if "#{==:#{@themux_status_${MODULE_NAME}_icon_bg},}"
    set -gqF "@themux_status_${MODULE_NAME}_icon_bg" "#{@themux_${MODULE_NAME}_color}"
  %endif

  %if "#{==:#{@themux_status_${MODULE_NAME}_text_bg},}"
    set -gqF @_tmx_module_text_bg "#{@themux_${MODULE_NAME}_color}"
  %else
    set -gqF @_tmx_module_text_bg "#{@themux_status_${MODULE_NAME}_text_bg}"
  %endif

  set -gF "@themux_status_${MODULE_NAME}" \
    "#[fg=#{@themux_status_${MODULE_NAME}_icon_bg}]#{@_tmx_connect_style}#{@themux_status_left_border}"

  set -agF "@themux_status_${MODULE_NAME}" \
    "#[fg=#{@themux_status_${MODULE_NAME}_icon_fg},bg=#{@themux_status_${MODULE_NAME}_icon_bg}]#{@themux_${MODULE_NAME}_icon}"

  set -agF "@themux_status_${MODULE_NAME}" \
    "#{@themux_status_middle_separator}"

  set -agF "@themux_status_${MODULE_NAME}" \
    "#[fg=#{@themux_status_${MODULE_NAME}_text_fg},bg=#{@_tmx_module_text_bg}]"

  set -ag "@themux_status_${MODULE_NAME}" "#{E:@themux_${MODULE_NAME}_text}"

  set -agF "@themux_status_${MODULE_NAME}" \
    "#[fg=#{@_tmx_module_text_bg}]#{@_tmx_connect_style}#{@themux_status_right_border}"

  set -ug @_tmx_connect_style
  set -ug @_tmx_module_text_bg

%endif
