set -g @themux_theme 'catppuccin_frappe'

# Compose the status line via the grammar: window list on the left, the session
# module on the right ("<left> / windows / <right>").
set -g @themux_status_line_1 "windows / session"

run  "#{d:current_file}/../../themux.tmux"

set -g default-shell '/opt/homebrew/bin/fish'
