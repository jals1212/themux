# vim:set ft=tmux:
%hidden MODULE_NAME="session"

set -ogq "@themux_${MODULE_NAME}_icon" " "
set -ogq "@themux_${MODULE_NAME}_color" "#{?client_prefix,#{E:@thm_red},#{E:@thm_green}}"
set -ogq "@themux_${MODULE_NAME}_text" " #S"

%if "#{==:#{@themux_module_text},naked}"
  # Naked prefix indicator: while the prefix is active the whole segment becomes
  # a badge — red background, theme-background text, bold. Rendered here (not via
  # the generic module render) so the deferred render does not clobber it; the
  # styles live in options because their commas would break the conditional.
  set -ogq "@themux_${MODULE_NAME}_prefix_style" "#[bg=#{@thm_red},fg=#{@thm_bg},bold]"
  set -ogq "@themux_${MODULE_NAME}_style" "#[bg=default,fg=#{@thm_green}]"

  set -g "@themux_module_${MODULE_NAME}" \
    "#{?client_prefix,#{E:@themux_${MODULE_NAME}_prefix_style},#{E:@themux_${MODULE_NAME}_style}}"
  set -ag "@themux_module_${MODULE_NAME}" "#{E:@themux_${MODULE_NAME}_icon}#{E:@themux_${MODULE_NAME}_text} "
%else
  source -F "#{d:current_file}/../utils/status_module.conf"
%endif
