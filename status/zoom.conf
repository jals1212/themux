# vim:set ft=tmux:
%hidden MODULE_NAME="zoom"

set -ogq "@themux_${MODULE_NAME}_icon" " "
set -ogqF "@themux_${MODULE_NAME}_color" "#{E:@thm_yellow}"
set -ogq "@themux_${MODULE_NAME}_text" " zoom"

source -F "#{d:current_file}/../utils/status_module.conf"

# The zoom module only renders while the active pane is zoomed: keep the
# rendered segment in a helper option (it contains commas, which would break
# the conditional) and wrap it in a window_zoomed_flag check.
%if "#{==:#{@themux_status_variant},flat}"
  # In flat mode the segment carries its own leading divider so it can
  # appear/disappear without leaving a dangling separator behind.
  set -gqF "@themux_status_${MODULE_NAME}_content" "#{@themux_status_separator}#{@themux_status_${MODULE_NAME}}"
%else
  set -gqF "@themux_status_${MODULE_NAME}_content" "#{@themux_status_${MODULE_NAME}}"
%endif
set -g "@themux_status_${MODULE_NAME}" "#{?window_zoomed_flag,#{E:@themux_status_${MODULE_NAME}_content},}"
