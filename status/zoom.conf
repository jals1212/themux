# vim:set ft=tmux:
%hidden MODULE_NAME="zoom"

set -ogq "@themux_${MODULE_NAME}_icon" " "
set -ogqF "@themux_${MODULE_NAME}_color" "#{E:@thm_yellow}"
set -ogq "@themux_${MODULE_NAME}_text" " zoom"

# The zoom module only renders while the active pane is zoomed; module_render.sh
# wraps the segment in this flag (and, for a naked text, keeps its own leading
# divider so it can appear/disappear without a dangling separator).
set -ogq "@themux_${MODULE_NAME}_when" "window_zoomed_flag"

source -F "#{d:current_file}/../utils/status_module.conf"
