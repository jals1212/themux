# vim:set ft=tmux:
%hidden MODULE_NAME="ram"

set -ogq @ram_low_fg_color "#{E:@thm_crust}"
set -ogq @ram_medium_fg_color "#{E:@thm_crust}"
set -ogq @ram_high_fg_color "#{E:@thm_crust}"

set -ogq @ram_low_bg_color "#{E:@thm_yellow}"
set -ogq @ram_medium_bg_color "#{E:@thm_yellow}"
set -ogq @ram_high_bg_color "#{E:@thm_red}"

set -ogq "@themux_${MODULE_NAME}_icon" "  "
set -ogqF "@themux_${MODULE_NAME}_color" "#{E:@thm_yellow}"
# The tmux-cpu fg/bg colors only make sense for pill backgrounds; in flat
# mode let the module color drive the segment instead.
%if "#{!=:#{@themux_status_variant},flat}"
set -ogq "@themux_status_${MODULE_NAME}_text_fg" "#{l:#{ram_fg_color}}"
set -ogq "@themux_status_${MODULE_NAME}_text_bg" "#{l:#{ram_bg_color}}"
%endif
set -ogq "@themux_${MODULE_NAME}_text" " #{l:#{ram_percentage}}"

source -F "#{d:current_file}/../utils/status_module.conf"
