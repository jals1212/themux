# vim:set ft=tmux:
# Default divider segment: compose it between status modules, e.g.
#   set -ga status-left "#{E:@themux_status_separator}"
# Extra named separators can be created from utils/separator.conf:
#   %hidden SEPARATOR_NAME="dot"
#   set -g @themux_dot_char "·"
#   source -F "<plugin>/utils/separator.conf"
#   set -ga status-left "#{E:@themux_status_dot}"
%hidden SEPARATOR_NAME="separator"

source -F "#{d:current_file}/../utils/separator.conf"
