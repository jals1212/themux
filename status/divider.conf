# vim:set ft=tmux:
# Default divider segment: compose it between status modules, e.g.
#   set -ga status-left "#{E:@themux_status_divider}"
# Extra named separators can be created from utils/divider.conf:
#   %hidden DIVIDER_NAME="dot"
#   set -g @themux_dot_text "·"
#   source -F "<plugin>/utils/divider.conf"
#   set -ga status-left "#{E:@themux_status_dot}"
%hidden DIVIDER_NAME="divider"

source -F "#{d:current_file}/../utils/divider.conf"
