# vim:set ft=tmux:
%hidden MODULE_NAME="cpu"

set -ogq @cpu_low_fg_color "#{E:@thm_crust}"
set -ogq @cpu_medium_fg_color "#{E:@thm_crust}"
set -ogq @cpu_high_fg_color "#{E:@thm_crust}"

set -ogq @cpu_low_bg_color "#{E:@thm_yellow}"
set -ogq @cpu_medium_bg_color "#{E:@thm_yellow}"
set -ogq @cpu_high_bg_color "#{E:@thm_red}"

set -ogq "@themux_${MODULE_NAME}_icon" " "
set -ogqF "@themux_${MODULE_NAME}_color" "#{E:@thm_yellow}"
set -ogq "@themux_${MODULE_NAME}_expand" "yes" # tmux-cpu literal needs inline compose
# In block variants the whole pill follows the threshold color (icon, text
# and caps), so an alert reads as a single red block; naked mode has no
# background, so the module color drives the text instead.
%if "#{!=:#{@themux_status_variant},naked}"
set -ogq "@themux_${MODULE_NAME}_icon_fg" "#{l:#{cpu_fg_color}}"
set -ogq "@themux_${MODULE_NAME}_icon_bg" "#{l:#{cpu_bg_color}}"
set -ogq "@themux_${MODULE_NAME}_text_fg" "#{l:#{cpu_fg_color}}"
set -ogq "@themux_${MODULE_NAME}_text_bg" "#{l:#{cpu_bg_color}}"
%endif
set -ogq "@themux_${MODULE_NAME}_text" " #{l:#{cpu_percentage}}"

source -F "#{d:current_file}/../utils/status_module.conf"
