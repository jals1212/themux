# vim:set ft=tmux:
#
# Themux reset pattern: source this file at the TOP of your theme config,
# before setting any @themux_* option. It wipes all themux-derived state
# (palette, @themux_* options, built segments, status/window formats) so a
# config re-source rebuilds everything cleanly — no `tmux kill-server`
# needed when switching themes or styles.
#
# The wipe only runs when a previous themux load is detected (@thm_bg set):
# on fresh servers `run` commands are deferred until after the initial
# config, where the wipe would otherwise erase freshly set options.
run "test -z \"\$(tmux show -gqv @thm_bg)\" || { tmux show -g | awk '\$1 ~ /^@(themux_|thm_|_tmx_)/ {print \$1}' | while read -r o; do tmux set -gu \"\$o\"; done; for o in status status-format 'status-format[0]' 'status-format[1]' status-style status-left status-right window-status-format window-status-current-format window-status-style window-status-current-style window-status-last-style window-status-separator window-status-activity-style window-status-bell-style mode-style message-style message-command-style clock-mode-colour menu-selected-style popup-style popup-border-style pane-border-style pane-active-border-style; do tmux set -gu \"\$o\" 2>/dev/null; tmux set -wgu \"\$o\" 2>/dev/null; done; }"
