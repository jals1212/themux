# vim:set ft=tmux:

# Rounded caps for the window badges, drawn with explicit colors (fg = block
# color, bg = bar color) instead of upstream's #[fg=<bar>,reverse] trick, which
# breaks when @themux_status_background is "none" (no bar color to reverse).
# After the left cap glyph we re-assert the block style so the number/name sit
# inside the rounded block; the right cap follows the name block color.
set -gq @themux_window_left_border \
  "#[fg=#{@themux_window_number_color},bg=#{@_tmx_status_bg}]#[fg=#{@thm_crust},bg=#{@themux_window_number_color}] "
set -gq @themux_window_middle_separator ""
set -gq @themux_window_right_border "#[fg=#{E:@_tmx_wt_bg},bg=#{@_tmx_status_bg}]"
set -gq @themux_window_current_left_border \
  "#[fg=#{@themux_window_current_number_color},bg=#{@_tmx_status_bg}]#[fg=#{@thm_crust},bg=#{@themux_window_current_number_color}] "
set -gq @themux_window_current_middle_separator " "
set -gq @themux_window_current_right_border "#[fg=#{E:@_tmx_cwt_bg},bg=#{@_tmx_status_bg}]"

source -F "#{d:current_file}/../../utils/window_block.conf"
