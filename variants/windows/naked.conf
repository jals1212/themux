# vim:set ft=tmux:
#
# Naked windows: colored text on the transparent background; a solid block marks
# the active window (activeness is what the color block is for in naked). Uses
# @themux_window_(current_)number_color and respects @themux_window_text_mode.
set -gF window-status-activity-style "bg=#{@thm_lavender},fg=#{@thm_crust}"
set -gF window-status-bell-style "bg=#{@thm_yellow},fg=#{@thm_crust}"
set -gF window-status-separator "#[fg=#{E:@themux_window_divider_color},bg=default]#{E:@themux_window_divider}"

source -F "#{d:current_file}/../../utils/window_flags.conf"
source -F "#{d:current_file}/../../utils/window_text.conf"

set -g window-status-style "default"
set -g window-status-current-style "default"
set -g window-status-last-style "default"

# Inactive: colored text, no block (the effective name resolves per window).
set -gF window-status-format \
  "#[fg=#{E:@themux_window_number_color},bg=default] #{@themux_window_number}##{E:@_tmx_w_text}#{@_tmx_w_flags} "
# Active: a solid block marks it.
set -gF window-status-current-format \
  "#[fg=#{@thm_crust},bg=#{E:@themux_window_current_number_color},bold] #{@themux_window_current_number}##{E:@_tmx_cw_text}#{@_tmx_w_flags} "

set -ug @_tmx_w_flags
