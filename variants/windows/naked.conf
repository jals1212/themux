# vim:set ft=tmux:

# Naked windows: colored text on the default (transparent) background; only
# the current window keeps a highlight background.
set -gF window-status-activity-style "bg=#{@thm_lavender},fg=#{@thm_crust}"
set -gF window-status-bell-style "bg=#{@thm_yellow},fg=#{@thm_crust}"

source -F "#{d:current_file}/../../utils/window_flags.conf"

set -gF window-status-style "fg=#{E:@themux_window_naked_text_color},bg=default"
set -gF window-status-last-style "fg=#{E:@themux_window_naked_last_color},bg=default"
set -gF window-status-current-style \
  "fg=#{E:@themux_window_naked_current_fg},bg=#{E:@themux_window_naked_current_bg},bold"
set -gF window-status-separator "#[fg=#{E:@themux_divider_color},bg=default]#{E:@themux_divider_text}"
set -gF window-status-format " #{@themux_window_number}#{@themux_window_text}#{@_tmx_w_flags} "
set -gF window-status-current-format " #{@themux_window_current_number}#{@themux_window_current_text}#{@_tmx_w_flags} "

set -ug @_tmx_w_flags
