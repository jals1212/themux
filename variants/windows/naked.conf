# vim:set ft=tmux:

# Naked windows: colored text on the default (transparent) background, no
# highlight block. Uses the same @themux_window_(current_)number_color as the
# block variants. @themux_window_fill "icon" instead gives the index a colored
# block and leaves the name as plain text.
set -gF window-status-activity-style "bg=#{@thm_lavender},fg=#{@thm_crust}"
set -gF window-status-bell-style "bg=#{@thm_yellow},fg=#{@thm_crust}"
set -gF window-status-separator "#[fg=#{E:@themux_window_divider_color},bg=default]#{E:@themux_window_divider}"

source -F "#{d:current_file}/../../utils/window_flags.conf"

%if "#{==:#{@themux_window_fill},icon}"
  set -g window-status-style "default"
  set -g window-status-current-style "default"
  set -g window-status-last-style "default"
  set -gF window-status-format \
    "#[fg=#{@thm_crust},bg=#{E:@themux_window_number_color}]#{@themux_window_number}#[fg=#{@thm_fg},bg=default]#{@themux_window_text}#{@_tmx_w_flags} "
  set -gF window-status-current-format \
    "#[fg=#{@thm_crust},bg=#{E:@themux_window_current_number_color}]#{@themux_window_current_number}#[fg=#{@thm_fg},bg=default,bold]#{@themux_window_current_text}#{@_tmx_w_flags} "
%else
  set -gF window-status-style "fg=#{E:@themux_window_number_color},bg=default"
  set -gF window-status-current-style "fg=#{E:@themux_window_current_number_color},bg=default,bold"
  set -gF window-status-format " #{@themux_window_number}#{@themux_window_text}#{@_tmx_w_flags} "
  set -gF window-status-current-format " #{@themux_window_current_number}#{@themux_window_current_text}#{@_tmx_w_flags} "
%endif

set -ug @_tmx_w_flags
