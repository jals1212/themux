# vim:set ft=tmux:

# Squared windows: solid blocks. The number's padding comes from the left
# border + the gate (so it centres for every variant); the name's own leading
# space separates it, so the middle/right borders stay empty.
set -gq @themux_window_left_border " "
set -gq @themux_window_middle_separator ""
set -gq @themux_window_right_border ""

source -F "#{d:current_file}/../../utils/window_block.conf"
