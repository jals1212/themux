# vim:set ft=tmux:

# Caps are drawn with explicit colors (fg = block color, bg = bar color)
# instead of upstream's #[fg=<bar>,reverse] trick, which breaks when
# @themux_status_background is "none" (there is no bar color to reverse).
set -gq @themux_window_left_border "#[fg=#{@themux_window_number_color},bg=#{@_tmx_status_bg}]"
set -gq @themux_window_current_left_border "#[fg=#{@themux_window_current_number_color},bg=#{@_tmx_status_bg}]"

%if "#{==:#{@themux_window_number_position},left}"
  set -gq @themux_window_middle_separator "#[fg=#{@themux_window_number_color},bg=#{E:@_tmx_wt_bg}]"
  set -gq @themux_window_current_middle_separator \
    "#[fg=#{@themux_window_current_number_color},bg=#{E:@_tmx_cwt_bg}]"
%else
  set -gq @themux_window_middle_separator " #[fg=#{@themux_window_number_color},bg=#{E:@_tmx_wt_bg}]"
  set -gq @themux_window_current_middle_separator \
    " #[fg=#{@themux_window_current_number_color},bg=#{E:@_tmx_cwt_bg}]"
%endif

set -gq @themux_window_right_border "#[fg=#{E:@_tmx_wt_bg},bg=#{@_tmx_status_bg}]█"
set -gq @themux_window_current_right_border "#[fg=#{E:@_tmx_cwt_bg},bg=#{@_tmx_status_bg}]█"

source -F "#{d:current_file}/../../utils/window_block.conf"
