# vim:set ft=tmux:

# Squared blocks for the optional pane status.
set -ogq @themux_pane_left_separator "█"
set -ogq @themux_pane_middle_separator "█"
set -ogq @themux_pane_right_separator "█"

set -wgF pane-active-border-style "#{E:@themux_pane_active_border_style}"
set -wgF pane-border-style "#{E:@themux_pane_border_style}"

%if "#{==:#{@themux_pane_status_enabled},yes}"
  # "internal" variables are kept as @_tmx_p_.*
  # and then unset at the end.
  set -gq @_tmx_p_left "" # the content on the left, usually a separator
  set -gq @_tmx_p_middle ""
  set -gq @_tmx_p_right ""
  set -gq @_tmx_p_number ""
  set -gq @_tmx_p_text ""

  %if "#{==:#{@themux_pane_default_fill},none}"
    set -g @_tmx_p_left \
      "#[fg=#{@thm_surface_0},bg=default]#{@themux_pane_left_separator}"
    set -g @_tmx_p_middle \
      "#[fg=#{@thm_fg},bg=#{@thm_surface_0}]#{@themux_pane_middle_separator}"
    set -g @_tmx_p_right \
      "#[fg=#{@thm_surface_0},bg=default]#{@themux_pane_right_separator}"

    set -g @_tmx_p_number \
      "#[fg=#{@thm_fg},bg=#{@thm_surface_0}]##{pane_index}"
    set -g @_tmx_p_text \
      "#[fg=#{@thm_fg},bg=#{@thm_surface_0}]#{E:@themux_pane_default_text}"

  %elif "#{==:#{@themux_pane_default_fill},all}"

    set -g @_tmx_p_left \
      "#[fg=#{E:@themux_pane_color},bg=default]#{@themux_pane_left_separator}"
    set -g @_tmx_p_middle \
      "#[fg=#{E:@themux_pane_color},bg=#{E:@themux_pane_background_color}]#{@themux_pane_middle_separator}"
    set -g @_tmx_p_right \
      "#[fg=#{E:@themux_pane_color},bg=default]#{@themux_pane_right_separator}"

    set -g @_tmx_p_number \
      "#[fg=#{E:@themux_pane_background_color},bg=#{E:@themux_pane_color}]##{pane_index}"
    set -g @_tmx_p_text \
      "#[fg=#{E:@themux_pane_background_color},bg=#{E:@themux_pane_color}]#{E:@themux_pane_default_text}"

  %elif "#{==:#{@themux_pane_default_fill},number}"

    %if "#{==:#{@themux_pane_number_position},left}"
      set -g @_tmx_p_left \
        "#[fg=#{E:@themux_pane_color},bg=default]#{@themux_pane_left_separator}"
      set -g @_tmx_p_right \
        "#[fg=#{E:@themux_pane_background_color},bg=default]#{@themux_pane_right_separator}"
    %else
      set -g @_tmx_p_left \
        "#[fg=#{E:@themux_pane_background_color},bg=default]#{@themux_pane_left_separator}"
      set -g @_tmx_p_right \
        "#[fg=#{E:@themux_pane_color},bg=default]#{@themux_pane_right_separator}"
    %endif

    set -g @_tmx_p_middle \
      "#[fg=#{E:@themux_pane_color},bg=#{E:@themux_pane_background_color}]#{@themux_pane_middle_separator}"

    set -g @_tmx_p_number \
      "#[fg=#{E:@themux_pane_background_color},bg=#{E:@themux_pane_color}]##{pane_index}"
    set -g @_tmx_p_text \
      "#[fg=#{E:@themux_pane_color},bg=#{E:@themux_pane_background_color}]#{E:@themux_pane_default_text}"

  %endif

  %if "#{==:#{@themux_pane_number_position},left}"
    set -wgF pane-border-format \
      "#{E:@_tmx_p_left}#{E:@_tmx_p_number}#{E:@_tmx_p_middle} #{E:@_tmx_p_text}#{E:@_tmx_p_right}"
  %else
    set -wgF pane-border-format \
      "#{E:@_tmx_p_left}#{E:@_tmx_p_text} #{E:@_tmx_p_middle}#{E:@_tmx_p_number}#{E:@_tmx_p_right}"
  %endif

  set -ug @_tmx_p_left
  set -ug @_tmx_p_middle
  set -ug @_tmx_p_right
  set -ug @_tmx_p_number
  set -ug @_tmx_p_text
%endif
