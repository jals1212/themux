# vim:set ft=tmux:

# Squared blocks for the optional pane status: no cap glyph, the block is its own
# bg fill (mirrors the squared window badge); pane_render adds the centring pads.
set -ogq @themux_pane_left_border ""
set -ogq @themux_pane_right_border ""

source -F "#{d:current_file}/../../utils/panes_block.conf"
