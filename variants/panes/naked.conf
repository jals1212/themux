# vim:set ft=tmux:
#
# Naked panes: plain borders on the default (transparent) background. Mirrors the
# naked window — the status label (when enabled) is colored text on the inactive
# pane and a solid accent block on the active one, so activeness reads the same
# way windows do, in the pane's own color.
set -wgF pane-border-style "bg=default,fg=#{@thm_surface_0}"
set -wgF pane-active-border-style "bg=default,fg=#{@thm_overlay_0}"

%if "#{!=:#{@themux_pane_status},off}"
  set -gF pane-border-status "#{@themux_pane_status}"
  # Active pane -> crust on an accent block; inactive -> accent text, no block.
  # "##{?pane_active,...}" survives the -F to be evaluated per pane at draw time.
  set -wgF pane-border-format \
    "#[fg=##{?pane_active,#{@thm_crust},#{E:@themux_pane_color}},bg=##{?pane_active,#{E:@themux_pane_color},default}] ##{pane_index} #{E:@themux_pane_default_text} "
%endif
