# vim:set ft=tmux:
# minimal — flat, transparent modules separated by thin dividers.
# A preset is just option "props": variants, layout and the module lists that
# themux expands into the bar. Everything is -ogq, so your own options win.
set -ogq @themux_status_variant "flat"
set -ogq @themux_windows_variant "flat"
set -ogq @themux_panes_variant "flat"
set -ogq @themux_status_background "none"
set -ogq @themux_divider_text " │ "
set -ogq @themux_windows_line "inline"
set -ogq @themux_status_left_modules "session divider application divider directory zoom"
set -ogq @themux_status_right_modules "gitmux divider ram divider date_time"
