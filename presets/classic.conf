# vim:set ft=tmux:
# classic — solid rounded blocks on a themed status bar (the catppuccin look).
# A preset is two phases: "options" sets props before the defaults (so your
# own options win), "compose" lays out the bar after the modules are built.

%if "#{==:${TMX_PRESET_PHASE},options}"
  set -ogq @themux_status_variant "rounded"
  set -ogq @themux_windows_variant "rounded"
  set -ogq @themux_panes_variant "squared"
  set -ogq @themux_status_background "default"
  set -ogq @themux_windows_line "inline"
%endif

%if "#{==:${TMX_PRESET_PHASE},compose}"
  set -g status-left ""
  set -ga status-left "#{E:@themux_status_session}"
  set -ga status-left "#{E:@themux_status_application}"
  set -ga status-left "#{E:@themux_status_directory}"
  set -ga status-left "#{E:@themux_status_zoom}"

  set -g status-right ""
  # gitmux expands at draw time; ram needs -agF for its threshold interpolation.
  set -ag status-right "#{E:@themux_status_gitmux}"
  set -agF status-right "#{E:@themux_status_ram}"
  set -ga status-right "#{E:@themux_status_date_time}"
%endif
