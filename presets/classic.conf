# vim:set ft=tmux:
# classic — solid rounded blocks on a themed status bar (the catppuccin look).
# A preset is just option "props": variants, layout and the module lists that
# themux expands into the bar. Everything is -ogq, so your own options win.
set -ogq @themux_status_variant "rounded"
set -ogq @themux_windows_variant "rounded"
set -ogq @themux_panes_variant "squared"
set -ogq @themux_status_background "default"
set -ogq @themux_windows_line "inline"
set -ogq @themux_status_left_modules "session application directory zoom"
set -ogq @themux_status_right_modules "gitmux ram date_time"
