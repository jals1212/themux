# vim:set ft=tmux:
# Requires https://github.com/olimorris/tmux-pomodoro-plus
%hidden MODULE_NAME="pomodoro_plus"

set -ogq "@themux_${MODULE_NAME}_icon" " "
set -ogqF "@themux_${MODULE_NAME}_color" "#{E:@thm_peach}"
