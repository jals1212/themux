# vim:set ft=tmux:
%hidden MODULE_NAME="gitmux"

# Requires https://github.com/arl/gitmux (uses gitmux's own defaults).
set -ogq "@themux_${MODULE_NAME}_icon" " 󰊢 "
set -ogq "@themux_${MODULE_NAME}_color" "#{E:@thm_teal}"
set -gq "@themux_${MODULE_NAME}_text" ' #(gitmux "#{pane_current_path}")'

# gitmux paints its own segments and resets the background between them (#[none],
# #[bg=default]), so it would punch holes in the module's block. Mark it
# self-styled: the renderer wraps the text in #[push-default] so those resets
# land on the module's background instead of the bare bar.
set -ogq "@themux_${MODULE_NAME}_self_styled" "yes"

# Only render inside a git work tree (a cheap rev-parse, evaluated per refresh).
# Driving the gate through @themux_<name>_when lets the module renderer hide the
# whole segment when outside a repo and, in a powerline run, lets neighbours
# connect straight through instead of around an empty gitmux.
set -gq "@_tmx_${MODULE_NAME}_in_repo" '#(git -C "#{pane_current_path}" rev-parse --is-inside-work-tree 2>/dev/null)'
set -gq "@themux_${MODULE_NAME}_when" "#{E:@_tmx_${MODULE_NAME}_in_repo}"

source -F "#{d:current_file}/../utils/module_block.conf"
