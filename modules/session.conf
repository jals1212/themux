# vim:set ft=tmux:
%hidden MODULE_NAME="session"

set -ogq "@themux_${MODULE_NAME}_icon" ""
set -ogq "@themux_${MODULE_NAME}_color" "#{E:@thm_green}"  # resting (no prefix)
set -ogq "@themux_${MODULE_NAME}_text" "#S"

# While the prefix (Ctrl-a) is held the leading takes a red accent: the active
# appearance keeps the slot's variant (a solid leading badges red, a naked one
# turns its text red) and only swaps the colour. @themux_<name>_active_when gates
# it at draw time; the text slot has no active accent, so it stays calm.
set -ogq "@themux_${MODULE_NAME}_leading_active_color" "#{E:@thm_red}"
set -ogq "@themux_${MODULE_NAME}_active_when" "client_prefix"

source -F "#{d:current_file}/../utils/module_block.conf"
