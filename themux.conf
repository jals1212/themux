source -F "#{d:current_file}/themes/#{@themux_theme}_tmux.conf"

%if "#{==:#{@themux_status_background},default}"
  set -gF @_tmx_status_bg "#{@thm_mantle}"
  set -gF status-style "bg=#{@_tmx_status_bg},fg=#{@thm_fg}"

  %hidden TMX_MESSAGE_BACKGROUND="#{@thm_overlay_0}"
%elif "#{==:#{@themux_status_background},none}"
  set -g status-style "default"
  set -g @_tmx_status_bg "none"

  %hidden TMX_MESSAGE_BACKGROUND="default"
%else
  # Treat @themux_status_background as a format string.
  set -gF status-style "bg=#{E:@themux_status_background},fg=#{@thm_fg}"
  set -gF @_tmx_status_bg "#{E:@themux_status_background}"

  %hidden TMX_MESSAGE_BACKGROUND="#{E:@themux_status_background}"
%endif

source -F "#{d:current_file}/status/application.conf"
source -F "#{d:current_file}/status/battery.conf"
source -F "#{d:current_file}/status/clima.conf"
source -F "#{d:current_file}/status/cpu.conf"
source -F "#{d:current_file}/status/date_time.conf"
source -F "#{d:current_file}/status/directory.conf"
source -F "#{d:current_file}/status/gitmux.conf"
source -F "#{d:current_file}/status/host.conf"
source -F "#{d:current_file}/status/kube.conf"
source -F "#{d:current_file}/status/load.conf"
source -F "#{d:current_file}/status/pomodoro_plus.conf"
source -F "#{d:current_file}/status/ram.conf"
source -F "#{d:current_file}/status/separator.conf"
source -F "#{d:current_file}/status/session.conf"
source -F "#{d:current_file}/status/uptime.conf"
source -F "#{d:current_file}/status/user.conf"
source -F "#{d:current_file}/status/weather.conf"
source -F "#{d:current_file}/status/zoom.conf"

# messages
set -gF message-style "fg=#{@thm_teal},bg=$TMX_MESSAGE_BACKGROUND,align=centre"
set -gF message-command-style "fg=#{@thm_teal},bg=$TMX_MESSAGE_BACKGROUND,align=centre"

# menu
%if "#{>=:#{version},3.4}"
  set -gF menu-selected-style "#{E:@themux_menu_selected_style}"
%endif

# panes
%if "#{!=:#{@themux_panes_variant},unstyled}"
  source -F "#{d:current_file}/variants/panes/#{@themux_panes_variant}.conf"
%endif

# popups
%if "#{>=:#{version},3.4}"
  set -gF popup-style "bg=#{@thm_bg},fg=#{@thm_fg}"
  set -gF popup-border-style "fg=#{@thm_surface_1}"
%endif

# window status
%if "#{!=:#{@themux_windows_variant},unstyled}"
  source -F "#{d:current_file}/variants/windows/#{@themux_windows_variant}.conf"
%endif

# Two-line layout: with @themux_windows_line "1" the window list moves to
# the second status line (these are the stock status-format[0] contents,
# split at the window-list section).
%if "#{==:#{@themux_windows_line},1}"
  set -g status 2
  set -g status-format[0] "#[align=left range=left #{E:status-left-style}]#[push-default]#{T;=/#{status-left-length}:status-left}#[pop-default]#[norange default]#[nolist align=right range=right #{E:status-right-style}]#[push-default]#{T;=/#{status-right-length}:status-right}#[pop-default]#[norange default]"
  set -g status-format[1] "#[list=on align=#{status-justify}]#[list=left-marker]<#[list=right-marker]>#[list=on]#{W:#[range=window|#{window_index} #{E:window-status-style}#{?#{&&:#{window_last_flag},#{!=:#{E:window-status-last-style},default}}, #{E:window-status-last-style},}#{?#{&&:#{window_bell_flag},#{!=:#{E:window-status-bell-style},default}}, #{E:window-status-bell-style},#{?#{&&:#{||:#{window_activity_flag},#{window_silence_flag}},#{!=:#{E:window-status-activity-style},default}}, #{E:window-status-activity-style},}}]#[push-default]#{T:window-status-format}#[pop-default]#[norange default]#{?loop_last_flag,,#{window-status-separator}},#[range=window|#{window_index} list=focus #{?#{!=:#{E:window-status-current-style},default},#{E:window-status-current-style},#{E:window-status-style}}#{?#{&&:#{window_last_flag},#{!=:#{E:window-status-last-style},default}}, #{E:window-status-last-style},}#{?#{&&:#{window_bell_flag},#{!=:#{E:window-status-bell-style},default}}, #{E:window-status-bell-style},#{?#{&&:#{||:#{window_activity_flag},#{window_silence_flag}},#{!=:#{E:window-status-activity-style},default}}, #{E:window-status-activity-style},}}]#[push-default]#{T:window-status-current-format}#[pop-default]#[norange list=on default]#{?loop_last_flag,,#{window-status-separator}}}"
%endif

# Mode style. This is used for copy mode highlighting to style the current selection.
set -gF mode-style "bg=#{@thm_surface_0},bold"
set -gF clock-mode-colour "#{@thm_blue}"
