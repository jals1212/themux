run "#{d:current_file}/utils/load_theme.sh"

%if "#{==:#{@themux_status_background},default}"
  set -gF @_tmx_status_bg "#{@thm_mantle}"
  set -gF status-style "bg=#{@_tmx_status_bg},fg=#{@thm_fg}"

  %hidden TMX_MESSAGE_BACKGROUND="#{@thm_overlay_0}"
%elif "#{==:#{@themux_status_background},none}"
  set -g status-style "default"
  set -g @_tmx_status_bg "default"

  # The status bar is transparent, but the message/command-prompt overlay needs an
  # opaque background: it draws OVER the status line, so a transparent fill would
  # leave the status-format bleeding through the prompt (rename, command mode, ...).
  %hidden TMX_MESSAGE_BACKGROUND="#{@thm_mantle}"
%else
  # Treat @themux_status_background as a format string.
  set -gF status-style "bg=#{E:@themux_status_background},fg=#{@thm_fg}"
  set -gF @_tmx_status_bg "#{E:@themux_status_background}"

  %hidden TMX_MESSAGE_BACKGROUND="#{E:@themux_status_background}"
%endif

source -F "#{d:current_file}/modules/application.conf"
source -F "#{d:current_file}/modules/battery.conf"
source -F "#{d:current_file}/modules/clima.conf"
source -F "#{d:current_file}/modules/cpu.conf"
source -F "#{d:current_file}/modules/date_time.conf"
source -F "#{d:current_file}/modules/directory.conf"
source -F "#{d:current_file}/modules/git.conf"
source -F "#{d:current_file}/modules/gitmux.conf"
source -F "#{d:current_file}/modules/host.conf"
source -F "#{d:current_file}/modules/kube.conf"
source -F "#{d:current_file}/modules/load.conf"
source -F "#{d:current_file}/modules/pomodoro_plus.conf"
source -F "#{d:current_file}/modules/ram.conf"
source -F "#{d:current_file}/modules/session.conf"
source -F "#{d:current_file}/modules/time.conf"
source -F "#{d:current_file}/modules/uptime.conf"
source -F "#{d:current_file}/modules/user.conf"
source -F "#{d:current_file}/modules/weather.conf"
source -F "#{d:current_file}/modules/zoom.conf"

# Rendered divider for "|" in the module lists (built once; not a status
# module — it is added declaratively, never composed on its own).
set -g @_tmx_module_divider \
  "#[fg=#{E:@themux_module_divider_color},bg=default]#{E:@themux_module_divider}"

# messages / command-prompt (rename-window, command mode, confirm-before). `fill`
# repaints the whole status line with the message background so the prompt fully
# replaces the status-format instead of drawing over it — without `fill` the
# window list and modules bleed through the prompt. `align` must NOT be set: any
# alignment defeats the fill and the status re-appears on the uncovered side.
set -gF message-style "fg=#{@thm_teal},bg=$TMX_MESSAGE_BACKGROUND,fill=$TMX_MESSAGE_BACKGROUND"
set -gF message-command-style "fg=#{@thm_teal},bg=$TMX_MESSAGE_BACKGROUND,fill=$TMX_MESSAGE_BACKGROUND"

# menu
%if "#{>=:#{version},3.4}"
  set -gF menu-selected-style "#{E:@themux_menu_selected_style}"
%endif

# panes — styled only when the border label is enabled (@themux_pane_status);
# the shape only chooses cap glyphs (drawn in pane_render.sh), so every
# non-unstyled shape shares one block setup.
%if "#{!=:#{@themux_pane_status},off}"
  %if "#{!=:#{@themux_pane_shape},unstyled}"
    source -F "#{d:current_file}/utils/pane_block.conf"
  %endif
%endif

# popups
%if "#{>=:#{version},3.4}"
  set -gF popup-style "bg=#{@thm_bg},fg=#{@thm_fg}"
  set -gF popup-border-style "fg=#{@thm_surface_1}"
%endif

# window status — the shape only chooses cap glyphs (drawn in window_render.sh),
# so every non-unstyled shape shares one block setup.
%if "#{!=:#{@themux_window_shape},unstyled}"
  source -F "#{d:current_file}/utils/window_block.conf"
%endif

# Window-list block for the per-line layout (utils/layout.sh). %ALIGN% is replaced
# with each "windows" zone's alignment; %WEDGE% selects the per-occurrence edge
# variant (none|left|right|both) produced by window_render.sh, so a grammar `=`
# flushes only the window list that actually sits on that row edge. When window
# styling is unstyled, fall back to tmux's native window-status-format.
set -g @_tmx_fmt_windows "#[list=on align=%ALIGN%]#[list=left-marker]<#[list=right-marker]>#[list=on]#{W:#[range=window|#{window_index} #{E:window-status-style}#{?#{&&:#{window_last_flag},#{!=:#{E:window-status-last-style},default}}, #{E:window-status-last-style},}#{?#{&&:#{window_bell_flag},#{!=:#{E:window-status-bell-style},default}}, #{E:window-status-bell-style},#{?#{&&:#{||:#{window_activity_flag},#{window_silence_flag}},#{!=:#{E:window-status-activity-style},default}}, #{E:window-status-activity-style},}}]#[push-default]#{?#{==:#{@_tmx_wfmt_%WEDGE%},},#{T:window-status-format},#{E:@_tmx_wfmt_%WEDGE%}}#[pop-default]#[norange default]#{?loop_last_flag,,#{E:window-status-separator}},#[range=window|#{window_index} list=focus #{?#{!=:#{E:window-status-current-style},default},#{E:window-status-current-style},#{E:window-status-style}}#{?#{&&:#{window_last_flag},#{!=:#{E:window-status-last-style},default}}, #{E:window-status-last-style},}#{?#{&&:#{window_bell_flag},#{!=:#{E:window-status-bell-style},default}}, #{E:window-status-bell-style},#{?#{&&:#{||:#{window_activity_flag},#{window_silence_flag}},#{!=:#{E:window-status-activity-style},default}}, #{E:window-status-activity-style},}}]#[push-default]#{?#{==:#{@_tmx_cwfmt_%WEDGE%},},#{T:window-status-current-format},#{E:@_tmx_cwfmt_%WEDGE%}}#[pop-default]#[norange list=on default]#{?loop_last_flag,,#{E:window-status-separator}}}"

# Mode style. This is used for copy mode highlighting to style the current selection.
set -gF mode-style "bg=#{@thm_surface_0},bold"
set -gF clock-mode-colour "#{@thm_blue}"

# Build the status lines from @themux_status_line_1..5 once the modules
# exist (deferred so every @themux_status_* segment is defined).
run "#{d:current_file}/utils/layout.sh"
