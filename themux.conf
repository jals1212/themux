source -F "#{d:current_file}/themes/#{@themux_theme}_tmux.conf"

%if "#{==:#{@themux_status_background},default}"
  set -gF @_tmx_status_bg "#{@thm_mantle}"
  set -gF status-style "bg=#{@_tmx_status_bg},fg=#{@thm_fg}"

  %hidden TMX_MESSAGE_BACKGROUND="#{@thm_overlay_0}"
%elif "#{==:#{@themux_status_background},none}"
  set -g status-style "default"
  set -g @_tmx_status_bg "none"

  %hidden TMX_MESSAGE_BACKGROUND="default"
%else
  # Treat @themux_status_background as a format string.
  set -gF status-style "bg=#{E:@themux_status_background},fg=#{@thm_fg}"
  set -gF @_tmx_status_bg "#{E:@themux_status_background}"

  %hidden TMX_MESSAGE_BACKGROUND="#{E:@themux_status_background}"
%endif

source -F "#{d:current_file}/status/application.conf"
source -F "#{d:current_file}/status/battery.conf"
source -F "#{d:current_file}/status/clima.conf"
source -F "#{d:current_file}/status/cpu.conf"
source -F "#{d:current_file}/status/date_time.conf"
source -F "#{d:current_file}/status/directory.conf"
source -F "#{d:current_file}/status/gitmux.conf"
source -F "#{d:current_file}/status/host.conf"
source -F "#{d:current_file}/status/kube.conf"
source -F "#{d:current_file}/status/load.conf"
source -F "#{d:current_file}/status/pomodoro_plus.conf"
source -F "#{d:current_file}/status/ram.conf"
source -F "#{d:current_file}/status/separator.conf"
source -F "#{d:current_file}/status/session.conf"
source -F "#{d:current_file}/status/uptime.conf"
source -F "#{d:current_file}/status/user.conf"
source -F "#{d:current_file}/status/weather.conf"
source -F "#{d:current_file}/status/zoom.conf"

# messages
set -gF message-style "fg=#{@thm_teal},bg=$TMX_MESSAGE_BACKGROUND,align=centre"
set -gF message-command-style "fg=#{@thm_teal},bg=$TMX_MESSAGE_BACKGROUND,align=centre"

# menu
%if "#{>=:#{version},3.4}"
  set -gF menu-selected-style "#{E:@themux_menu_selected_style}"
%endif

# panes
set -wgF pane-active-border-style "#{E:@themux_pane_active_border_style}"
set -wgF pane-border-style "#{E:@themux_pane_border_style}"

%if "#{==:#{@themux_pane_status_enabled},yes}"
  # "internal" variables are kept as @_tmx_p_.*
  # and then unset at the end.
  set -gq @_tmx_p_left "" # the content on the left, usually a separator
  set -gq @_tmx_p_middle ""
  set -gq @_tmx_p_right ""
  set -gq @_tmx_p_number ""
  set -gq @_tmx_p_text ""

  %if "#{==:#{@themux_pane_default_fill},none}"
    set -g @_tmx_p_left \
      "#[fg=#{@thm_surface_0},bg=default]#{@themux_pane_left_separator}"
    set -g @_tmx_p_middle \
      "#[fg=#{@thm_fg},bg=#{@thm_surface_0}]#{@themux_pane_middle_separator}"
    set -g @_tmx_p_right \
      "#[fg=#{@thm_surface_0},bg=default]#{@themux_pane_right_separator}"

    set -g @_tmx_p_number \
      "#[fg=#{@thm_fg},bg=#{@thm_surface_0}]##{pane_index}"
    set -g @_tmx_p_text \
      "#[fg=#{@thm_fg},bg=#{@thm_surface_0}]#{E:@themux_pane_default_text}"

  %elif "#{==:#{@themux_pane_default_fill},all}"

    set -g @_tmx_p_left \
      "#[fg=#{E:@themux_pane_color},bg=default]#{@themux_pane_left_separator}"
    set -g @_tmx_p_middle \
      "#[fg=#{E:@themux_pane_color},bg=#{E:@themux_pane_background_color}]#{@themux_pane_middle_separator}"
    set -g @_tmx_p_right \
      "#[fg=#{E:@themux_pane_color},bg=default]#{@themux_pane_right_separator}"

    set -g @_tmx_p_number \
      "#[fg=#{E:@themux_pane_background_color},bg=#{E:@themux_pane_color}]##{pane_index}"
    set -g @_tmx_p_text \
      "#[fg=#{E:@themux_pane_background_color},bg=#{E:@themux_pane_color}]#{E:@themux_pane_default_text}"

  %elif "#{==:#{@themux_pane_default_fill},number}"

    %if "#{==:#{@themux_pane_number_position},left}"
      set -g @_tmx_p_left \
        "#[fg=#{E:@themux_pane_color},bg=default]#{@themux_pane_left_separator}"
      set -g @_tmx_p_right \
        "#[fg=#{E:@themux_pane_background_color},bg=default]#{@themux_pane_right_separator}"
    %else
      set -g @_tmx_p_left \
        "#[fg=#{E:@themux_pane_background_color},bg=default]#{@themux_pane_left_separator}"
      set -g @_tmx_p_right \
        "#[fg=#{E:@themux_pane_color},bg=default]#{@themux_pane_right_separator}"
    %endif

    set -g @_tmx_p_middle \
      "#[fg=#{E:@themux_pane_color},bg=#{E:@themux_pane_background_color}]#{@themux_pane_middle_separator}"

    set -g @_tmx_p_number \
      "#[fg=#{E:@themux_pane_background_color},bg=#{E:@themux_pane_color}]##{pane_index}"
    set -g @_tmx_p_text \
      "#[fg=#{E:@themux_pane_color},bg=#{E:@themux_pane_background_color}]#{E:@themux_pane_default_text}"

  %endif

  %if "#{==:#{@themux_pane_number_position},left}"
    set -wgF pane-border-format \
      "#{E:@_tmx_p_left}#{E:@_tmx_p_number}#{E:@_tmx_p_middle} #{E:@_tmx_p_text}#{E:@_tmx_p_right}"
  %else
    set -wgF pane-border-format \
      "#{E:@_tmx_p_left}#{E:@_tmx_p_text} #{E:@_tmx_p_middle}#{E:@_tmx_p_number}#{E:@_tmx_p_right}"
  %endif

  set -ug @_tmx_p_left
  set -ug @_tmx_p_middle
  set -ug @_tmx_p_right
  set -ug @_tmx_p_number
  set -ug @_tmx_p_text
%endif

# popups
%if "#{>=:#{version},3.4}"
  set -gF popup-style "bg=#{@thm_bg},fg=#{@thm_fg}"
  set -gF popup-border-style "fg=#{@thm_surface_1}"
%endif

%if "#{==:#{@themux_window_status_style},basic}"

  set -gq @themux_window_left_separator " "
  set -gq @themux_window_middle_separator " "
  set -gq @themux_window_right_separator " "

%elif "#{==:#{@themux_window_status_style},rounded}"

  set -gq @themux_window_left_separator "#[fg=#{@_tmx_status_bg},reverse]#[none]"
  set -gq @themux_window_middle_separator " "
  set -gq @themux_window_right_separator "#[fg=#{@_tmx_status_bg},reverse]#[none]"

%elif "#{==:#{@themux_window_status_style},slanted}"

  set -gq @themux_window_left_separator "#[fg=#{@_tmx_status_bg},reverse]#[none]"

  %if "#{==:#{@themux_window_number_position},left}"
    set -gq @themux_window_middle_separator "#[fg=#{@themux_window_number_color},bg=#{@themux_window_text_color}]"
    set -gq @themux_window_current_middle_separator \
      "#[fg=#{@themux_window_current_number_color},bg=#{@themux_window_current_text_color}]"
  %else
    set -gq @themux_window_middle_separator " #[fg=#{@themux_window_number_color},bg=#{@themux_window_text_color}]"
    set -gq @themux_window_current_middle_separator \
      " #[fg=#{@themux_window_current_number_color},bg=#{@themux_window_current_text_color}]"
  %endif

  set -gq @themux_window_right_separator "#[fg=#{@_tmx_status_bg},reverse]█#[none]"

%endif

# DO NOT USE -o IN YOUR OWN CONFIGURATION
set -ogqF @themux_window_current_left_separator "#{@themux_window_left_separator}"
set -ogqF @themux_window_current_middle_separator "#{@themux_window_middle_separator}"
set -ogqF @themux_window_current_right_separator "#{@themux_window_right_separator}"

# window status
%if "#{!=:#{@themux_window_status_style},none}"
  set -gF window-status-activity-style "bg=#{@thm_lavender},fg=#{@thm_crust}"
  set -gF window-status-bell-style "bg=#{@thm_yellow},fg=#{@thm_crust}"

   %if "#{==:#{@themux_window_flags},icon}"
    set -gqF @_tmx_w_flags "#{E:@themux_window_flags_icon_format}"
  %elif "#{==:#{@themux_window_flags},text}"
    set -gq @_tmx_w_flags "#F"
  %else
    set -gq @_tmx_w_flags ""
  %endif

  %if "#{==:#{@themux_window_status_style},flat}"

  # Flat style: windows are colored text on the default (transparent)
  # background; only the current window keeps a highlight background.
  set -gF window-status-style "fg=#{E:@themux_window_flat_text_color},bg=default"
  set -gF window-status-last-style "fg=#{E:@themux_window_flat_last_color},bg=default"
  set -gF window-status-current-style \
    "fg=#{E:@themux_window_flat_current_fg},bg=#{E:@themux_window_flat_current_bg},bold"
  set -gF window-status-separator "#[fg=#{E:@themux_separator_color},bg=default]#{E:@themux_separator_char}"
  set -gF window-status-format " #{@themux_window_number}#{@themux_window_text}#{@_tmx_w_flags} "
  set -gF window-status-current-format " #{@themux_window_current_number}#{@themux_window_current_text}#{@_tmx_w_flags} "

  %else

  set -g @_tmx_w_number_style "#[fg=#{@thm_crust},bg=#{@themux_window_number_color}]"
  set -g @_tmx_w_text_style "#[fg=#{@thm_fg},bg=#{@themux_window_text_color}]"
  %if "#{==:#{@themux_window_number_position},left}"
    set -gF window-status-format \
      "#{E:@_tmx_w_number_style}#{E:@themux_window_left_separator}#{@themux_window_number}"
    set -agF window-status-format "#{E:@themux_window_middle_separator}"
    set -agF window-status-format \
      "#{E:@_tmx_w_text_style}#{@themux_window_text}#{@_tmx_w_flags}#{E:@themux_window_right_separator}"
  %else
    set -gF window-status-format \
      "#{E:@_tmx_w_text_style}#{E:@themux_window_left_separator}#{E:@_tmx_w_text_style}#{@themux_window_text}#{@_tmx_w_flags}"
    set -agF window-status-format "#{E:@themux_window_middle_separator}"
    set -agF window-status-format \
      "#{E:@_tmx_w_number_style} #{@themux_window_number}#{E:@themux_window_right_separator}"
  %endif

  # =======================================
  # And do the same for the current window.
  # =======================================

  set -g @_tmx_w_number_style "#[fg=#{@thm_crust},bg=#{@themux_window_current_number_color}]"
  set -g @_tmx_w_text_style "#[fg=#{@thm_fg},bg=#{@themux_window_current_text_color}]"
  %if "#{==:#{@themux_window_number_position},left}"
    set -gF window-status-current-format \
      "#{E:@_tmx_w_number_style}#{E:@themux_window_current_left_separator}#{@themux_window_current_number}"
    set -agF window-status-current-format "#{E:@themux_window_current_middle_separator}"
    set -agF window-status-current-format \
      "#{E:@_tmx_w_text_style}#{@themux_window_current_text}#{@_tmx_w_flags}#{E:@themux_window_current_right_separator}"
  %else
    set -gF window-status-current-format \
      "#{E:@_tmx_w_text_style}#{E:@themux_window_current_left_separator}#{E:@_tmx_w_text_style}#{@themux_window_current_text}#{@_tmx_w_flags}"
    set -agF window-status-current-format "#{E:@themux_window_current_middle_separator}"
    set -agF window-status-current-format \
      "#{E:@_tmx_w_number_style} #{@themux_window_current_number}#{E:@themux_window_current_right_separator}"
  %endif

  %endif

  # Cleanup (unset) all of the internal variables.
  set -ug @_tmx_w_number_style
  set -ug @_tmx_w_text_style
  set -ug @_tmx_w_flags
%endif

# Two-line layout: with @themux_windows_line "1" the window list moves to
# the second status line (these are the stock status-format[0] contents,
# split at the window-list section).
%if "#{==:#{@themux_windows_line},1}"
  set -g status 2
  set -g status-format[0] "#[align=left range=left #{E:status-left-style}]#[push-default]#{T;=/#{status-left-length}:status-left}#[pop-default]#[norange default]#[nolist align=right range=right #{E:status-right-style}]#[push-default]#{T;=/#{status-right-length}:status-right}#[pop-default]#[norange default]"
  set -g status-format[1] "#[list=on align=#{status-justify}]#[list=left-marker]<#[list=right-marker]>#[list=on]#{W:#[range=window|#{window_index} #{E:window-status-style}#{?#{&&:#{window_last_flag},#{!=:#{E:window-status-last-style},default}}, #{E:window-status-last-style},}#{?#{&&:#{window_bell_flag},#{!=:#{E:window-status-bell-style},default}}, #{E:window-status-bell-style},#{?#{&&:#{||:#{window_activity_flag},#{window_silence_flag}},#{!=:#{E:window-status-activity-style},default}}, #{E:window-status-activity-style},}}]#[push-default]#{T:window-status-format}#[pop-default]#[norange default]#{?loop_last_flag,,#{window-status-separator}},#[range=window|#{window_index} list=focus #{?#{!=:#{E:window-status-current-style},default},#{E:window-status-current-style},#{E:window-status-style}}#{?#{&&:#{window_last_flag},#{!=:#{E:window-status-last-style},default}}, #{E:window-status-last-style},}#{?#{&&:#{window_bell_flag},#{!=:#{E:window-status-bell-style},default}}, #{E:window-status-bell-style},#{?#{&&:#{||:#{window_activity_flag},#{window_silence_flag}},#{!=:#{E:window-status-activity-style},default}}, #{E:window-status-activity-style},}}]#[push-default]#{T:window-status-current-format}#[pop-default]#[norange list=on default]#{?loop_last_flag,,#{window-status-separator}}}"
%endif

# Mode style. This is used for copy mode highlighting to style the current selection.
set -gF mode-style "bg=#{@thm_surface_0},bold"
set -gF clock-mode-colour "#{@thm_blue}"
