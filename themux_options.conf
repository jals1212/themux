# All options and their defaults.
#
# This is executed separately to the main configuration
# so that options are set before parsing the rest of the config.


# themux resets its own derived state automatically when it loads (see
# themux.tmux), so re-sourcing your config switches theme/style cleanly.


# Theme selection: themes/<@themux_theme>.palette (a "name hex" palette).
# Available: catppuccin_{mocha,macchiato,frappe,latte},
#            kanagawa_{wave,dragon,lotus}, kanso_{zen,ink,mist,pearl}
set -ogq @themux_theme "catppuccin_mocha"

set -ogq @themux_status_background "default"

# Flush the bar's outer caps to the terminal edge (nvim-style): the edge item's
# outer cap is dropped so its block fills solid to the border. off|left|right|both.
# Two independent controls — _module_ flushes the edge *module group*, _window_
# flushes the edge *window ribbon* (windows as the first/last token of a flushing
# zone) — so the module bar and the window list flush separately. Capped shapes
# only; separate window pills (@themux_window_seam "|") are not flushed.
set -ogq @themux_module_flush_edges "off"
set -ogq @themux_window_flush_edges "off"

# Shared item props (DO NOT USE -o IN YOUR OWN CONFIGURATION). One value sets the
# default for ALL items at once — windows, panes and modules. A per-item option
# (@themux_<item>_<prop>, e.g. @themux_window_shape) overrides the shared value
# for that item only. Precedence: per-item > @themux_all_* > built-in.
# Values are documented in the per-item blocks below.
set -ogq @themux_all_shape "squared"
set -ogq @themux_all_leading "solid"
set -ogq @themux_all_text "soft"
set -ogq @themux_all_notch "off"
set -ogq @themux_all_leading_position "left"
set -ogq @themux_all_leading_highlight "both"
set -ogq @themux_all_text_highlight "both"

# Window variant props (DO NOT USE -o IN YOUR OWN CONFIGURATION) — each window
# badge is a component; every part is styled on its own:
#   shape     : squared | rounded | slanted | powerline | unstyled  (border/caps)
#   leading : solid | soft | subtle | naked            (the number block)
#   text      : solid | soft | subtle | naked            (the name block; the
#               window name content lives in @themux_window_name)
#   notch     : on | off                                 (number<->name seam)
# Styles: solid = accent block, soft = grey block, subtle = grey block + accent
# text, naked = transparent + accent text. Defaults come from @themux_all_*; set
# @themux_window_{shape,leading,text,notch} here to override just windows.
# How adjacent windows meet in the list, mirroring the module connectors (symbols
# only): | separate pills (default, like a space between modules) | <> raised
# (active window over its neighbours) | > right | < left | = flat. Anything but |
# joins the list into one ribbon (needs a capped shape + left numbers).
set -ogq @themux_window_seam "|"
# Active highlight: which channel of each part takes the active colour when the
# window is current. off freezes that part at its inactive colour.
#   off | bg | fg | both     (default both = the whole part highlights)
# Defaults via @themux_all_{leading,text}_highlight; override per window here.

# Status line layout (DO NOT USE -o IN YOUR OWN CONFIGURATION)
# Define up to 5 lines; each is "<left> / <center> / <right>". A zone is a
# module list (token NAMEs; "|" divider, space = separate, =/>/< merge modules)
# or the special token "windows" (the window list). Blank zones render nothing;
# the number of non-empty lines sets how many status rows are shown.
set -ogq @themux_status_line_1 " / windows / "
set -ogq @themux_status_line_2 ""
set -ogq @themux_status_line_3 ""
set -ogq @themux_status_line_4 ""
set -ogq @themux_status_line_5 ""
# Optional per-line @themux_status_line_<N>_prepend / _append pin arbitrary content
# (text, emoji, #{...}, #[styles]) to that row's far left / far right — handy for
# padding. Unset = nothing. A prepend cancels that line's LEFT *_flush_edges (the
# edge item no longer touches the border); an append cancels the RIGHT flush.

# Module variant props (DO NOT USE -o IN YOUR OWN CONFIGURATION) — each status
# module is a component; every part is styled on its own:
#   shape     : squared | rounded | slanted | powerline | unstyled  (border/caps)
#   leading : solid | soft | subtle | naked            (the icon block)
#   text      : solid | soft | subtle | naked            (the text block)
#   notch     : on | off                                 (icon<->text seam)
# Styles: solid = accent block, soft = grey block, subtle = grey block + accent
# text, naked = transparent + accent text. Defaults come from @themux_all_*; set
# @themux_module_{shape,leading,text,notch} here to override just modules.
# Alert highlight: which channel of each part takes a module's alert colour (the
# cpu/ram threshold override). off freezes that part at its normal colour.
#   off | bg | fg | both     (default both = the whole part takes the alert)
# Defaults via @themux_all_{leading,text}_highlight; override per module here.
# Indicator (icon) position relative to the text. left | right. Default via
# @themux_all_leading_position; override with @themux_module_leading_position.

# Divider inserted by "|" between modules in the lists above. Modules merge into
# a powerline run only through the explicit =/>/< connectors in the layout string,
# not through this divider (a plain space leaves each module its own pill).
set -ogq @themux_module_divider " "
set -ogq @themux_module_divider_color "#{E:@thm_overlay_0}"

# Menu styling options
set -ogq @themux_menu_selected_style "fg=#{@thm_fg},bold,bg=#{@thm_overlay_0}"

# Pane styling options (DO NOT USE -o IN YOUR OWN CONFIGURATION)
# Variant props — the pane label is a component; each part is styled on its own:
#   shape     : squared | rounded | slanted | powerline | unstyled  (border/caps)
#   leading : solid | soft | subtle | naked            (the pane number block)
#   text      : solid | soft | subtle | naked            (the label block)
#   notch     : on | off                                 (leading<->text seam)
# Styles: solid = accent block, soft = grey block, subtle = grey block + accent
# text, naked = transparent + accent text. Defaults come from @themux_all_*; set
# @themux_pane_{shape,leading,text,notch} here to override just panes.
# Active highlight: which channel of each part takes the active colour on the
# active pane. off freezes that part at its inactive colour.
#   off | bg | fg | both     (default both = the whole part highlights)
# Defaults via @themux_all_{leading,text}_highlight; override per pane here.
set -ogq @themux_pane_status "off" # off, top, bottom — shows a styled label
                                  # on each pane border (mirrors tmux's
                                  # pane-border-status)
set -ogq @themux_pane_border_style "fg=#{@thm_overlay_0}"
set -ogq @themux_pane_active_border_style "##{?pane_in_mode,fg=#{@thm_lavender},##{?pane_synchronized,fg=#{@thm_mauve},fg=#{@thm_lavender}}}"
# Per-part colours: <part>_color is the base (inactive pane) colour, <part>_
# highlight_color the active-pane one; _highlight (above) picks which channels.
set -ogq @themux_pane_leading_color "#{@thm_overlay_0}"
set -ogq @themux_pane_leading_highlight_color "#{@thm_green}"
set -ogq @themux_pane_text_color "#{@thm_overlay_0}"
set -ogq @themux_pane_text_highlight_color "#{@thm_green}"
set -ogq @themux_pane_background_color "#{@thm_surface_0}"
set -ogq @themux_pane_default_text "##{b:pane_current_path}"
# @themux_pane_leading_position defaults via @themux_all_leading_position.

# Window options (DO NOT USE -o IN YOUR OWN CONFIGURATION)
# Per-part accents (number, name) with a base and an active (_highlight_color)
# variant; _highlight (above) picks which channels swap. soft/subtle blocks fill
# from the shared background_color instead of the accent (mirrors panes).
set -ogq @themux_window_leading_color "#{@thm_overlay_2}"
set -ogq @themux_window_leading_highlight_color "#{@thm_mauve}"
set -ogq @themux_window_text_color "#{@thm_overlay_2}"
set -ogq @themux_window_text_highlight_color "#{@thm_mauve}"
# Shared neutral fill for soft/subtle blocks (same role as @themux_pane_background_color).
set -ogq @themux_window_background_color "#{@thm_surface_0}"
set -ogq @themux_window_name " #W"
set -ogq @themux_window_number "#I"
# Window name visibility: always shown / never (number only) / only on windows
# you renamed by hand (automatic-rename off). Content is @themux_window_name.
set -ogq @themux_window_name_mode "always" # always, never, manual
set -ogq @themux_window_current_name " #W"
set -ogq @themux_window_current_number "#I"
# @themux_window_leading_position defaults via @themux_all_leading_position.

# Divider between windows in the window list (sets window-status-separator).
# Emptying it ("") connects the windows into one powerline ribbon (rounded/
# slanted, left numbers) with the active window raised over its neighbours. That
# mode colours seams from the neighbour and caps the first window by index, so it
# assumes contiguous indices — pair it with `set -g renumber-windows on`.
set -ogq @themux_window_divider " "
set -ogq @themux_window_divider_color "#{E:@thm_overlay_0}"

# Window flags
set -ogq @themux_window_flags "none"
set -ogq @themux_window_flags_icon_last " 󰖰" # -
set -ogq @themux_window_flags_icon_current " 󰖯" # *
set -ogq @themux_window_flags_icon_zoom " 󰁌" # Z
set -ogq @themux_window_flags_icon_mark " 󰃀" # M
set -ogq @themux_window_flags_icon_silent " 󰂛" # ~
set -ogq @themux_window_flags_icon_activity " 󱅫" # #
set -ogq @themux_window_flags_icon_bell " 󰂞" # !
# Matches icon order when using `#F` (`#!~[*-]MZ`)
set -ogq @themux_window_flags_icon_format "##{?window_activity_flag,#{E:@themux_window_flags_icon_activity},}##{?window_bell_flag,#{E:@themux_window_flags_icon_bell},}##{?window_silence_flag,#{E:@themux_window_flags_icon_silent},}##{?window_active,#{E:@themux_window_flags_icon_current},}##{?window_last_flag,#{E:@themux_window_flags_icon_last},}##{?window_marked_flag,#{E:@themux_window_flags_icon_mark},}##{?window_zoomed_flag,#{E:@themux_window_flags_icon_zoom},} "

# Status line options (DO NOT USE -o IN YOUR OWN CONFIGURATION)
# The module caps come from the shape (drawn in utils/module_render.sh); the
# middle separator is the gap between a module's icon and text (replaced by the
# shape's cap seam when @themux_module_notch is on).
set -ogq @themux_module_middle_separator ""
set -ogq @themux_module_connect_separator "no" # yes, no
