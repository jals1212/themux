# All options and their defaults.
#
# This is executed separately to the main configuration
# so that options are set before parsing the rest of the config.


# To reset all themux state on a running server (theme switches, style
# switches) source themux_reset.conf before setting options — see README.


# Theme selection: themes/<@themux_theme>_tmux.conf.
# Available: catppuccin_{mocha,macchiato,frappe,latte},
#            kanagawa_{wave,dragon,lotus}
set -ogq @themux_theme "catppuccin_mocha"

set -ogq @themux_status_background "default"

# Style variants (DO NOT USE -o IN YOUR OWN CONFIGURATION)
# Each UI item selects its variant independently; "unstyled" makes themux
# leave that item untouched so it can be styled by hand with @thm_* colors.
# - status:  pill (classic catppuccin blocks) or flat (transparent text;
#            compose dividers with the @themux_status_separator segment and
#            pair with @themux_status_background "none")
# - windows: squared, rounded, slanted (block looks) or flat
# - panes:   pill (catppuccin borders + optional pane status) or flat
set -ogq @themux_status_variant "pill" # pill, flat, unstyled
set -ogq @themux_windows_variant "squared" # squared, rounded, slanted, flat, unstyled
set -ogq @themux_panes_variant "pill" # pill, flat, unstyled

# Move the window list to its own status line: "0" keeps the stock single
# line; "1" raises `status` to 2 and renders the window list on the second
# line (aligned by status-justify), leaving line 0 to status-left/right.
set -ogq @themux_windows_line "0" # 0, 1

# Flat window colors, used when @themux_windows_variant is "flat"
# (DO NOT USE -o IN YOUR OWN CONFIGURATION)
set -ogq @themux_window_flat_text_color "#{@thm_rosewater}"
set -ogq @themux_window_flat_last_color "#{@thm_peach}"
set -ogq @themux_window_flat_current_fg "#{@thm_bg}"
set -ogq @themux_window_flat_current_bg "#{@thm_peach}"

# Menu styling options
set -ogq @themux_menu_selected_style "fg=#{@thm_fg},bold,bg=#{@thm_overlay_0}"

# Pane styling options (DO NOT USE -o IN YOUR OWN CONFIGURATION)
set -ogq @themux_pane_status_enabled "no" # set to "yes" to enable
set -ogq @themux_pane_border_status "off" # set to "yes" to enable
set -ogq @themux_pane_border_style "fg=#{@thm_overlay_0}"
set -ogq @themux_pane_active_border_style "##{?pane_in_mode,fg=#{@thm_lavender},##{?pane_synchronized,fg=#{@thm_mauve},fg=#{@thm_lavender}}}"
set -ogq @themux_pane_left_separator "█"
set -ogq @themux_pane_middle_separator "█"
set -ogq @themux_pane_right_separator "█"
set -ogq @themux_pane_color "#{@thm_green}"
set -ogq @themux_pane_background_color "#{@thm_surface_0}"
set -ogq @themux_pane_default_text "##{b:pane_current_path}"
set -ogq @themux_pane_default_fill "number"
set -ogq @themux_pane_number_position "left" # right, left

# NOTE: Changes to make the option names more intuitive and more closely follow
# the tmux naming conventions.
# @themux_window_current_background -> @themux_window_current_number_color
# @themux_window_current_color      -> @themux_window_current_text_color
# @themux_window_default_background -> @themux_window_number_color
# @themux_window_default_color      -> @themux_window_text_color
# @themux_window_status             -> @themux_window_flags
#
# Removed:
# @themux_window_default_fill, @themux_window_current_fill
# Just set the number and text colors.

# Window options (DO NOT USE -o IN YOUR OWN CONFIGURATION)
set -ogq @themux_window_text_color "#{@thm_surface_0}"
set -ogq @themux_window_number_color "#{@thm_overlay_2}"
set -ogq @themux_window_text " #T"
set -ogq @themux_window_number "#I"
set -ogq @themux_window_current_text_color "#{@thm_surface_1}"
set -ogq @themux_window_current_number_color "#{@thm_mauve}"
set -ogq @themux_window_current_text " #T"
set -ogq @themux_window_current_number "#I"
set -ogq @themux_window_number_position "left"

# Window flags
set -ogq @themux_window_flags "none"
set -ogq @themux_window_flags_icon_last " 󰖰" # -
set -ogq @themux_window_flags_icon_current " 󰖯" # *
set -ogq @themux_window_flags_icon_zoom " 󰁌" # Z
set -ogq @themux_window_flags_icon_mark " 󰃀" # M
set -ogq @themux_window_flags_icon_silent " 󰂛" # ~
set -ogq @themux_window_flags_icon_activity " 󱅫" # #
set -ogq @themux_window_flags_icon_bell " 󰂞" # !
# Matches icon order when using `#F` (`#!~[*-]MZ`)
set -ogq @themux_window_flags_icon_format "##{?window_activity_flag,#{E:@themux_window_flags_icon_activity},}##{?window_bell_flag,#{E:@themux_window_flags_icon_bell},}##{?window_silence_flag,#{E:@themux_window_flags_icon_silent},}##{?window_active,#{E:@themux_window_flags_icon_current},}##{?window_last_flag,#{E:@themux_window_flags_icon_last},}##{?window_marked_flag,#{E:@themux_window_flags_icon_mark},}##{?window_zoomed_flag,#{E:@themux_window_flags_icon_zoom},} "

# Status line options (DO NOT USE -o IN YOUR OWN CONFIGURATION)
set -ogq @themux_status_left_separator ""
set -ogq @themux_status_middle_separator ""
set -ogq @themux_status_right_separator ""
set -ogq @themux_status_connect_separator "no" # yes, no

# Maintain backwards compatibility. Use @themux_status_module_bg_color if it is set.
set -ogq @themux_status_module_text_bg "#{?@themux_status_module_bg_color,#{E:@themux_status_module_bg_color},#{@thm_surface_0}}"
